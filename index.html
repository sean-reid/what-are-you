            { text: "Unexpected knock at the door. Threat level assessment:", options: ["Answer it like a normal person", "Peek through the peephole and make a tactical decision", "Freeze and pretend nobody is home", "Open the door but remain in a power stance"] },
            { text: "You found something legendary in your attic. It is:", options: ["A map to somewhere", "A cursed mirror that gives backhanded compliments", "A cookbook from 300 years ago", "A letter from my future self that just says NICE"] },
            { text: "Every emoji is deleted except one. You keep:", options: ["The thumbs up (covers 90 percent of situations)", "The skull (flexible in tone)", "The crying laughing face (controversial but effective)", "The shrug (perpetual ambiguity)"] },
            { text: "Most underrated life skill. Defend your answer:", options: ["Knowing when to stop talking", "Being able to nap anywhere", "Reading a room", "Making a meal out of whatever is in the fridge"] },
            { text: "Speech curse: everything must rhyme, or you refer to yourself in third person forever?", options: ["Rhyme. I am basically a rapper now.", "Third person. I am a legend in my own story.", "Rhyme. People will think I am quirky.", "Third person. It is deeply unsettling and I love it."] },
            { text: "An AI offers to plan your entire life for optimal happiness. You say:", options: ["Sure, I clearly cannot handle it myself", "No thanks, I like my chaos", "Only if it includes more naps", "I want to see the data first"] },
            { text: "Honestly, this really should have come with instructions:", options: ["Adulthood", "Social gatherings", "Folding a fitted sheet", "The first week at any new job"] },
            { text: "You have to write a Yelp review of your own life. How many stars?", options: ["4 stars. Good overall, some complaints.", "3 stars. Decent but needs improvement.", "2 stars. The management is terrible.", "5 stars. Masterpiece. No notes."] },
            { text: "Faking expertise. Your go-to technique:", options: ["Nod and say interesting a lot", "Ask vague questions that sound smart", "Agree with whoever is talking the loudest", "Confidently make things up and hope nobody checks"] },
            { text: "You can have dinner with any fictional character. Who?", options: ["Gandalf (wise and probably has great stories)", "Captain Jack Sparrow (chaotic dinner companion)", "Sherlock Holmes (he would roast me but I would learn something)", "Shrek (I bet the swamp food is underrated)"] },
            { text: "A survey asks how you are doing. Honest answer:", options: ["Pretty good, actually", "Surviving, which counts", "I am a series of coping mechanisms in a trench coat", "I peaked in 2019 and have been coasting since"] },
            { text: "Into the time capsule for the year 2126. Your contribution:", options: ["A smartphone with no charger", "A handwritten letter explaining memes", "A list of our dumbest inventions as a warning", "A single Croc shoe with no explanation"] },
            { text: "You find out tomorrow is your last day. What do you eat?", options: ["The fanciest meal I can find", "My grandma's cooking", "Everything. All of it. No limits.", "Gas station nachos. Go out the way I lived."] },
            { text: "Streaming service is open. Choosing what to watch:", options: ["I know exactly what I want", "Browse for 30 minutes, watch something I have seen before", "Let the algorithm decide my fate", "Read reviews for an hour, watch nothing, go to bed"] },
            { text: "You accidentally email the entire company. The email says:", options: ["Something embarrassingly wholesome", "A complaint about the office thermostat", "Just the word yes with no context", "My resignation, but I was not planning to quit"] },
            { text: "Your permanent scent: fresh cookies or brewed coffee?", options: ["Cookies. Everyone loves the cookie person.", "Coffee. Professional and inviting.", "Cookies, but people keep trying to eat me", "Coffee, because then every room I walk into feels like morning"] },
            { text: "You can teleport but you always arrive facing the wrong direction. Worth it?", options: ["Absolutely. I will just spin around.", "No, the disorientation would ruin me", "Yes, it adds mystery to my entrances", "I already walk into rooms confused so nothing changes"] },
            { text: "The UN calls. They need your help with a crisis only you can solve:", options: ["The thermostat war in my office", "Who gets the armrest on an airplane", "The great toilet paper orientation debate", "Whether to wave or nod at a neighbor you barely know"] },
            { text: "You get to live in any decade. Which?", options: ["The 1920s (jazz and chaos)", "The 1980s (music and neon)", "The 2000s (simpler internet times)", "The 3020s (I want to see flying cars or be disappointed)"] },
            { text: "UNEXPECTED ITEM IN BAGGING AREA. Your response:", options: ["Remove and rescan calmly", "Stare at the machine in betrayal", "Press the help button with my soul leaving my body", "Argue with the machine out loud"] },
            { text: "You are now the main character of the last show you watched. How doomed are you?", options: ["I will be fine", "Moderately concerned", "Extremely doomed", "I was already the main character of that show in my head"] },
            { text: "One color. That is all you get to describe your entire personality:", options: ["Blue (calm, thoughtful)", "Orange (energetic, warm)", "Green (grounded, growing)", "Plaid (I refuse to pick one)"] },
            { text: "I will sleep when I am dead, they say. Your thought:", options: ["Respect the hustle", "Concerned for their health", "They are going to be dead sooner at this rate", "I am those people and I am so tired"] },
            { text: "You get three extra hours today but they can only be used for one activity. Which?", options: ["Sleep (always sleep)", "A hobby I keep saying I will start", "Cooking an elaborate meal", "Absolutely nothing. Just sitting. Bliss."] },
            { text: "A stranger on the bus compliments your shoes. You:", options: ["Say thank you and feel great for 3 hours", "Compliment something of theirs back", "Tell them where I got the shoes, the price, the full backstory", "Get suspicious. What do they want?"] },
            { text: "Extinction reversal granted. One species gets a second chance:", options: ["Dodo bird (innocent and round)", "Woolly mammoth (majestic)", "Megalodon (terrible idea but exciting)", "Blockbuster Video (Friday nights were sacred)"] },
            { text: "What would your warning label say if you were a product?", options: ["Best before coffee", "May contain strong opinions", "Fragile: handle before noon", "Contents under pressure: do not shake"] },
            { text: "You discover a portal to a parallel universe. The only difference is:", options: ["Pizza is triangular everywhere and nobody questions it", "Dogs can talk but they only speak in riddles", "Everyone walks backwards on Wednesdays", "Gravity works slightly different and everything bounces a little"] },
            { text: "The snooze button: savior or saboteur?", options: ["It is a necessary evil", "I never use it, I am a morning person", "It is the greatest invention of all time", "I have a system of 7 snoozes and it is non-negotiable"] },
            { text: "The hill you will passionately die on for no logical reason:", options: ["The correct way to pronounce a specific word", "A very specific type of pen", "The ranking of potato preparations", "Whether a straw has one hole or two"] },
            { text: "You are now the CEO of a company that sells one product. What is the product?", options: ["Slightly better socks", "A pillow that is always the cold side", "An app that tells you what to eat for dinner", "Bottled disappointment (honest marketing)"] },
            { text: "It is 3 AM. Someone catches you doing something suspicious. You are:", options: ["Organizing your spice rack", "Googling how deep is the ocean", "Standing in the kitchen eating shredded cheese", "Mowing the lawn"] },
            { text: "You find out your life has a blooper reel. Your most common blooper:", options: ["Waving back at someone who was not waving at me", "Walking into a glass door", "Saying goodbye and walking the same direction as the person", "Pulling a push door with full confidence"] },
            { text: "Life becomes a musical. Do you sing every word or dance every step?", options: ["Sing. I am basically in a musical.", "Dance. My cardio would be incredible.", "Sing, but off-key so people leave me alone", "Dance, because then nobody can tell when I am lost - I am just vibing"] },
            { text: "The conspiracy theory you secretly never dismissed:", options: ["Mattress Firm is a front for something", "Pigeons work for the bourgeoisie", "The Bermuda Triangle is just shy", "All of human history is a simulation running on a very old computer"] },
            { text: "You are designing your dream bathroom. Non-negotiable feature:", options: ["Heated floors (luxury)", "A waterproof speaker system", "A window with a forest view", "A secret passage behind the mirror"] },
            { text: "Best non-food smell. This is a hill worth dying on:", options: ["Rain on hot pavement (petrichor)", "Old books", "A campfire", "The hardware store lumber aisle"] },
            { text: "You can curse someone with a mildly annoying enchantment. What is it?", options: ["Their socks always slowly slide down", "They can never remember if they locked the door", "One nostril is always slightly blocked", "They always pick the slowest checkout line"] },
            { text: "If you were a sandwich, you would be:", options: ["A classic club (reliable, well-structured)", "A messy cheesesteak (passionate, saucy)", "A PBJ (nostalgic, universally loved)", "Whatever that thing at the back of the deli case is"] },
            { text: "You spot someone you know at the grocery store. Gut reaction:", options: ["Pleasant surprise, brief chat", "Mild panic, change aisles", "Fine unless I look terrible", "I once drove to a different grocery store to avoid this"] },
            { text: "You have to live without one sense for a week. Which do you sacrifice?", options: ["Smell (manageable)", "Taste (a diet would be easier)", "Touch (I would float through life)", "My sense of shame (unleash the chaos)"] },
            { text: "Time to scream into the void. Choose your venue:", options: ["Everest (go big or go home)", "A gentle hill (I am tired and realistic)", "A parking garage rooftop (accessible void)", "I do not need a mountain. I scream everywhere."] },
            { text: "The ice-in-your-drink ratio. State your position:", options: ["A few cubes (balanced)", "Packed full (maximum cold)", "No ice (I do not want my drink diluted)", "I just want a cup of ice with a splash of drink"] },
            { text: "You are assigned a personal theme song that plays whenever you enter a room. You want:", options: ["Something cool and cinematic", "Something jazzy and smooth", "The Imperial March from Star Wars", "Yakety Sax, and I have no choice in the matter"] },
            { text: "Sand. One word to describe your relationship with it:", options: ["Love the beach, love the sand", "It is tolerable", "It gets everywhere and I have opinions about that", "I do not like sand. It is coarse and rough and irritating."] },
            { text: "Home decor, but everything must come from a single store:", options: ["IKEA (functional minimalism)", "Costco (bulk everything)", "Antique shop (character and ghosts)", "Spirit Halloween (year-round vibes)"] },
            { text: "A future version of you sends back one word of advice. It is:", options: ["Relax", "Run", "Invest", "Duck"] },
            { text: "Unlimited supply of one thing. The warehouse is ready:", options: ["Socks that never get lost", "Batteries that never die", "Stamps (weirdly practical)", "Confidence (the real answer)"] },
            { text: "You are standing in front of a classroom. You know nothing about today's topic:", options: ["Quantum physics (how hard can it be?)", "Ancient Sumerian pottery", "Advanced knot theory", "The mating habits of deep sea creatures"] },
            { text: "So I had the craziest dream, they begin. You:", options: ["Listen politely (I am a good person)", "Zone out but nod enthusiastically", "Interrupt with my own dream (rude but honest)", "Analyze it like a therapist whether they asked or not"] },
            { text: "You are reborn as a piece of furniture in your next life. Preference:", options: ["A bookshelf (intellectual and sturdy)", "A recliner (comfortable and loved)", "A coffee table (central to everything)", "The junk drawer (I contain multitudes)"] },
            { text: "What would you do with an extra arm?", options: ["Carry more groceries in one trip", "Always have a hand free for snacks", "Become the world's best hugger", "Gesture more dramatically during arguments"] },
            { text: "The definitive sign that someone is actually an adult:", options: ["Getting excited about a new sponge", "Having a favorite burner on the stove", "Bringing a jacket because it might get cold later", "Going to bed early on purpose and being happy about it"] },
            { text: "Hours are abolished. New unit of time, effective immediately:", options: ["Naps (I slept three naps ago)", "Songs (meet me in 12 songs)", "Cups of coffee (it has been a four-coffee day)", "Microwave minutes (each one lasts an eternity)"] },
            { text: "Your emotional setting: melodramatic over small stuff or eerily calm during disasters?", options: ["Overdramatic. Small things deserve attention too.", "Calm. I want to be unshakeable.", "Overdramatic. It is funnier.", "Calm about big things, because I already panic about small ones."] },
            { text: "You are at a buffet with one plate. Strategy:", options: ["Strategic sampling of everything", "Go straight for the most expensive items", "Build a structural masterpiece, maximum plate capacity", "Ignore the plate. Use my hands. They are bigger."] },
            { text: "Gravity shuts off for 10 minutes. First move:", options: ["Grab onto something immediately", "Float and enjoy the experience", "Try to swim through the air", "Eat soup mid-air just to watch it be weird"] },
            { text: "Pick something to be legally required to say before entering any building.", options: ["I come in peace", "Here we go again", "Permission to enter", "I brought snacks (even if you did not)"] },
            { text: "Your clone shows up at your door. First question you ask it:", options: ["Do you also have that weird knee thing?", "Can you go to work for me tomorrow?", "Which one of us is the evil one?", "Do you want to get food? I know exactly what you want."] },
            { text: "Most powerful energy a human being can radiate:", options: ["The person who is calm in a crisis", "The person who can nap anywhere", "The person who always knows a good restaurant", "The person who has never lost a game of rock paper scissors"] },
            { text: "You are tasked with hiding a giraffe. Where do you put it?", options: ["A very tall garage", "A forest where the trees are the same height", "I put a hat on it and call it a crane", "I do not hide it. I deny it exists while standing next to it."] },
            { text: "How often do you think about ancient civilizations?", options: ["Rarely", "When I see a cool building", "More than most people would guess", "Constantly. I have theories. You do not want to hear them."] },
            { text: "A ghost has possessed one of your household objects. It chose:", options: ["A slightly passive-aggressive toaster", "A lamp that flickers when you lie", "A fridge that sighs when you open it at midnight", "A chair that scoots away from you just slightly"] },
            { text: "You find out your dog has been keeping a diary. First entry:", options: ["They left again. I do not know if they will return.", "The mailman came. I defended the house. Nobody thanked me.", "The small human dropped food again. Today was a good day.", "I have seen things they would not understand. The vacuum lives."] },
            { text: "New party rule, effective immediately. Banned:", options: ["Talking about work", "Playing music from your phone speaker", "Leaving without saying goodbye", "Asking when the food is coming out more than twice"] },
            { text: "One store. Everything you need, forever. The store:", options: ["Target (vibes and basics)", "Costco (survival and bulk snacks)", "A farmer's market (wholesome and seasonal)", "A gas station (I am already living this life)"] },
            { text: "Your life is a podcast. What genre?", options: ["True crime (my life is suspenseful)", "Comedy (I narrate my own failures)", "Self-help (but I never take my own advice)", "ASMR (I just want people to relax around me)"] },
            { text: "Volume lock: whispering for an entire year or shouting for one week?", options: ["Whisper for a year. Mysterious vibes.", "Shout for a week. Get it over with.", "Whisper, because people lean in and that feels powerful", "Shout, and just blame it on an ear infection"] },
            { text: "You become a food truck owner. What do you sell?", options: ["Gourmet grilled cheese", "Tacos with unnecessarily fancy ingredients", "Breakfast burritos 24/7", "A single mystery item that changes daily"] },
            { text: "From now on, you dress exclusively like someone from:", options: ["1920s (classy and dramatic)", "1970s (groovy and bold)", "Medieval (fully armored to meetings)", "2003 (low-rise jeans and frosted tips, no regrets)"] },
            { text: "You get a pet rock. How do you treat it?", options: ["Give it a name and a little hat", "Place it respectfully on a shelf", "Talk to it like it is my therapist", "Train it. It will learn tricks. I have a plan."] },
            { text: "Rainy day. No plans. Ideal activity:", options: ["Read a book with tea (peaceful)", "Movie marathon under a blanket", "Go outside and embrace the rain", "Stare out the window like a Victorian ghost"] },
            { text: "New locomotion rules: hopping only or crawling only?", options: ["Hop. Great for my calves.", "Crawl. Low center of gravity.", "Hop. I will look eccentric, not weird.", "Crawl. I am already this tired, might as well be on the ground."] },
            { text: "You are put in charge of designing a new holiday. Theme:", options: ["A day where everyone stays home, guilt-free", "International Swap Jobs Day", "A festival where you can only speak in compliments", "The Purge, but for minor inconveniences only"] },
            { text: "Eyes open, phone in hand. First thing you check:", options: ["Time (how much sleep did I lose?)", "Messages (am I needed?)", "Weather (what outfit am I suffering in today?)", "Nothing. I stare at the ceiling first. A moment of peace."] },
            { text: "You find a map to buried treasure. The X is in:", options: ["A forest, and I am going immediately", "My neighbor's backyard, which is awkward", "A Walmart parking lot, which raises questions", "My own house, which means I have been living on top of treasure like an idiot"] },
            { text: "Your guaranteed argument-winning technique:", options: ["Stay calm and use facts", "Repeat their point back to them but better", "Simply outlast them. I have nowhere to be.", "Concede immediately and let them feel guilty about winning"] },
            { text: "Most powerful role in any group chat:", options: ["The meme supplier", "The one who actually makes plans happen", "The lurker who sees everything", "The one who accidentally leaves and gets added back"] },
            { text: "You are cast in a movie. Your role:", options: ["The confident lead with a dark past", "The lovable best friend who steals every scene", "Background character #4 who is living their best life", "The villain, but the audience agrees with me"] },
            { text: "Cold pizza for breakfast: revolutionary or sad?", options: ["Superior to hot pizza, actually", "Acceptable in emergencies", "A last resort", "I heat everything. Cold food is a myth I reject."] },
            { text: "Your strangely specific talent that impresses no one important:", options: ["Estimating how long a line will take", "Remembering birthdays", "Catching things people throw at me", "Knowing the exact right moment to leave a party"] },
            { text: "Small-town celebrity or big-city ghost. Which life?", options: ["Famous in a small town. I want fans.", "Anonymous in a big city. Freedom.", "Small town famous. Free stuff from the locals.", "Big city anonymous. Nobody knows my crimes."] },
            { text: "Five-star review of something awful. Sell it:", options: ["Airport food: Exceeded my rock-bottom expectations.", "Jury duty: Great bonding experience. Would convict again.", "A flat tire: Gave me time to reflect on my life choices.", "The DMV: The ambiance was unmatched. Hours of immersive waiting."] },
            { text: "A dog approaches you on the street. Protocol:", options: ["Ask the owner if I can pet it", "Get on the ground immediately, all bets are off", "Polite nod at the dog from a distance", "I am already petting it. Permission is implied."] },
            { text: "Your future self gives you a thumbs up from across a crowded room. This means:", options: ["Everything works out fine", "I am about to do something stupid but it will be worth it", "They are just being encouraging about nothing specific", "I should be very concerned about what a thumbs up means in the future"] },
            { text: "Calling in sick. The real reason (definitely not illness):", options: ["My bed was too comfortable. Medically, I could not leave.", "The weather outside is threatening", "Mercury is in retrograde and I am not taking chances", "I had a dream that I went to work and it was enough"] },
            { text: "The perfect hug duration. Be specific:", options: ["2-3 seconds (standard)", "5-6 seconds (meaningful)", "Until the other person lets go (commitment)", "I do not hug. I offer a firm nod."] },
            { text: "Cruel pasta restriction: one shape, rest of your life.", options: ["Penne (versatile, holds sauce)", "Spaghetti (classic, no notes)", "Farfalle (fun shaped, I like bowties)", "Lasagna sheets (technically pasta and I am using the loophole)"] },
            { text: "A witch offers to enchant one of your household items. Which?", options: ["My bed (self-making, temperature-regulating)", "My fridge (always stocked, never expires)", "My keys (can never be lost)", "My front door (only opens for people I actually want to see)"] },
            { text: "Waiting room behavior. Be honest:", options: ["Scroll my phone quietly", "Read the ancient magazines", "Make small talk with strangers", "Sit in a way that discourages anyone from sitting near me"] },
            { text: "Nominate a new Olympic sport. The committee is listening:", options: ["Avoiding people you know in public", "Parallel parking", "Getting out of bed on a cold morning", "Looking busy while doing nothing at work"] },
            { text: "You just got superpowers but you have to register them with the DMV. How long do you wait?", options: ["Go immediately. I follow the rules.", "Put it off for weeks", "Never register. Underground superhero.", "I go but argue about the forms they make me fill out"] },
            { text: "Eye contact: at what point does it become a threat?", options: ["Any at all with a stranger", "More than 3 seconds with an acquaintance", "Making eye contact while eating a banana", "Zero eye contact is actually worse"] },
            { text: "Morgan Freeman is available to narrate one aspect of your life:", options: ["My morning routine", "My internal monologue during meetings", "My attempts at cooking", "My search history (please, no)"] },
            { text: "One sentence of advice. Tattooed on your arm. It reads:", options: ["Drink more water", "Mind your own business", "It will probably be fine", "Never trust a fart"] },
            { text: "Your neighbor asks to borrow something weird. It is:", options: ["A ladder at 2 AM (concerning)", "Exactly 14 lemons (suspicious)", "A shovel and a tarp (alarming)", "My WiFi password (the audacity)"] },
            { text: "Someone just said supposably out loud. Internal reaction:", options: ["It does not bother me", "I notice but say nothing", "I gently correct them", "My eye twitches every time"] },
            { text: "You are designing a new form of currency. It is based on:", options: ["Good deeds (wholesome economy)", "Compliments (socially rich)", "How many dogs you have petted (the true measure of wealth)", "Embarrassing stories (everyone is rich but at what cost)"] },
            { text: "Last two vehicles on earth: kayak or unicycle?", options: ["Kayak. I will find water.", "Unicycle. I will learn.", "Kayak, even on land. I am dragging it.", "Unicycle. The office commute will be legendary."] },
            { text: "New alarm clock sound. Horrifying and effective:", options: ["Someone whispering your name", "The sound of a door slowly creaking open", "A single, loud clap every 30 seconds", "The Jaws theme getting progressively louder"] },
            { text: "What would you do if you found out you were in a simulation?", options: ["Try to find the cheat codes", "Keep living normally (the vibes are fine)", "Demand to speak to the developer", "Test the boundaries by doing increasingly weird things"] },
            { text: "You can bring one modern invention back to ancient Egypt. Which?", options: ["Sunglasses (practical and cool)", "A skateboard (immediately become a god)", "Air conditioning (I know they need it)", "A megaphone (maximum pharaoh energy)"] },
            { text: "The person ahead of you is backing into a parking space. Thoughts:", options: ["Respect the efficiency", "Show-offs, but whatever", "I do this and I will not apologize", "They are playing 4D chess and I am still playing checkers"] },
            { text: "You are starting a band. The genre:", options: ["Classic rock (timeless)", "Jazz (sophisticated and unexpected)", "Polka (ironically at first, then sincerely)", "We only play one note, but really well"] },
            { text: "You lean close to a horse and whisper:", options: ["I know what you did", "You are faster than you think", "The carrot situation is being handled", "Between you and me, I am also just pretending to know what I am doing"] },
            { text: "Worst sound a human can hear. Final answer:", options: ["Nails on a chalkboard (classic)", "A mosquito near your ear at 3 AM", "Your alarm on Monday morning", "Someone eating with their mouth open"] },
            { text: "You are now the captain of a pirate ship. First order:", options: ["Find treasure (classic pirate stuff)", "Everyone gets a parrot", "We only steal snacks", "Mandatory team-building activities. Even pirates need synergy."] },
            { text: "A robot asks you to prove you are human. You:", options: ["Click all the traffic lights", "Cry on command", "Make a decision I immediately regret", "I cannot prove it. I have doubts myself."] },
            { text: "How many blankets do you sleep with?", options: ["One, like a regulated adult", "Two, one for warmth and one for emotional support", "A nest of at least four", "Zero. I sleep on a bare mattress like a protagonist in a sad movie."] },
            { text: "One thing you wish worked in real life the way it works in movies:", options: ["Parking (always a spot right in front)", "Hacking (just typing fast and saying I'm in)", "Cooking (everything turns out perfect on the first try)", "Waking up (no alarm, hair perfect, fully rested)"] },
            { text: "Most aggressive apple-eating technique:", options: ["Bite it like a barbarian, no slicing", "Eat the whole thing, core and all", "Throw it in the air and catch it in my mouth", "Make unbroken eye contact with someone while eating it"] },
            { text: "One cuisine. Every meal. Rest of your life:", options: ["Italian (pasta and pizza, done)", "Mexican (tacos are a complete food group)", "Japanese (sushi and ramen, balanced)", "American diner (breakfast all day, every day)"] },
            { text: "Sparkle curse: glitter sneezes or confetti burps?", options: ["Sneeze glitter. Fabulous and inconvenient.", "Burp confetti. Life of the party.", "Glitter. People will think I am magical.", "Confetti. Every meal ends with a celebration."] },
            { text: "You get to ask the universe one question and get a truthful answer. What do you ask?", options: ["What is the meaning of life?", "Is there life elsewhere in the universe?", "What should I do with my life?", "Where do all the missing socks go?"] },
            { text: "Instant trust signal. If someone does this, they are good people:", options: ["They return their shopping cart", "They have a dog that loves them", "They admit when they do not know something", "They use their turn signal in an empty parking lot"] },
            { text: "They just pronounced it completely differently than you. Next move:", options: ["Live and let live", "Silently judge but never mention it", "Casually use the word correctly in the next sentence", "Stop the entire conversation to discuss it"] },
            { text: "A genie says you can live forever but you have to work retail one day a year. Deal?", options: ["Deal. One day is nothing.", "No deal. Retail broke me once.", "Deal, but only if I pick the store", "I would rather be mortal than face Black Friday again"] },
            { text: "An app that does not exist but absolutely should:", options: ["Shazam but for smells", "Uber but for someone to go to social events for you", "Google Maps but for finding things in your own house", "An app that tells you if the person texting you is mad or just busy"] },
            { text: "Trapped in a painting for a week. Art style:", options: ["A peaceful Monet landscape (relaxing)", "A Dali surrealist painting (weird but interesting)", "A Renaissance feast scene (I am eating well)", "A Picasso (I am ready to have my face rearranged)"] },
            { text: "What do you do with the bread heel?", options: ["Eat it. Waste not.", "Use it for toast only", "Leave it for the next person", "Throw it away and feel a small amount of guilt forever"] },
            { text: "You can have a conversation with any animal for 5 minutes. Who?", options: ["My own pet (I have so many questions)", "A whale (what have you seen down there?)", "A housefly (what is your problem?)", "The specific squirrel that keeps raiding my bird feeder"] },
            { text: "A life hack that nobody asked for but you swear by:", options: ["Use a fork to eat chips so your fingers stay clean", "Carry a tiny notebook to write down insults for later", "Set all your clocks 5 minutes ahead and forget you did it", "Name your WiFi network something threatening so neighbors stay away"] },
            { text: "Body swap for a week. Whose life are you living?", options: ["A pro athlete (I want to know what fitness feels like)", "A world leader (I am curious about the stress)", "My pet (I want to see what they do when I leave)", "My own clone (I just want a second opinion on being me)"] },
            { text: "How many windows should a house have?", options: ["As many as possible (light and air)", "Just enough (balance privacy and brightness)", "Floor to ceiling glass (fishbowl living)", "None. I do not want the outside looking in."] },
            { text: "Daily accessory, non-negotiable: a sword or a cape?", options: ["Sword. Practical and intimidating.", "Cape. Dramatic and windswept.", "Sword, but I use it to cut sandwiches", "Cape, because running anywhere makes it billow and I feel powerful"] },
            { text: "Your autobiography has a plot twist. It is:", options: ["I was right about everything and nobody listened", "The person I thought was my rival was actually my biggest fan", "I was sleep-living a double life the entire time", "There is no plot twist. That IS the twist."] },
            { text: "Pick something to be mandatory in every workplace.", options: ["A nap room", "A snack budget for every employee", "One meeting-free day per week", "A live-in office dog that reports to nobody"] },
            { text: "You are writing a children's book. The title:", options: ["The Dinosaur Who Hated Mondays", "Everyone Has a Skeleton Inside Them (and That Is Fine)", "Why Vegetables Are Lying to You", "The Little Engine That Said Nah"] },
            { text: "Guest says your cooking is amazing. Honest response:", options: ["Thank you, it was easy (lie)", "Downplay it immediately", "Accept it with pride and share the recipe", "Break down the entire process and how it almost went wrong"] },
            { text: "A scientist says they need a human test subject. Your response:", options: ["What does it pay?", "What are the side effects?", "I volunteer as long as there is a snack break", "I have been preparing for this my whole life"] },
            { text: "The small luxury you will defend with your life:", options: ["Good toilet paper", "Name-brand cereal", "A streaming subscription", "The extra guacamole at Chipotle, even though it costs more"] },
            { text: "You have exactly 60 seconds to impress a stranger. You:", options: ["Tell a great joke", "Show them an oddly specific skill", "Compliment them with alarming accuracy", "Perform a magic trick that only sort of works"] },
            { text: "What would you do if you found out your house was built on an ancient burial ground?", options: ["Apologize to the ghosts and offer snacks", "Move immediately", "Negotiate cohabitation terms", "Finally have an excuse for why things keep going wrong"] },
            { text: "The superpower that sounds cool until you think about it for five seconds:", options: ["Reading minds (I do not want to know)", "Super speed (I would never be patient again)", "Telekinesis (I would get so lazy)", "Invisibility (I would learn things about people I cannot unlearn)"] },
            { text: "Spider spotted. Threat assessment:", options: ["Calmly relocate it outside", "Freeze and assess the threat level", "Scream once, then deal with it", "The spider and I have reached a territorial agreement"] },
            { text: "You are designing heaven. What is the first feature you add?", options: ["Unlimited sleep with no consequences", "A restaurant with every food ever made", "Everyone you have ever loved is there", "WiFi. It is fast. It never buffers."] },
            { text: "Choose your superpower: always land on your feet, or always land the joke?", options: ["Land on my feet. I fall a lot.", "Comedic timing. I want to be funny.", "Feet. Safety first.", "Comedic timing. Being funny IS landing on your feet, socially."] },
            { text: "You have bad news to deliver. Your method:", options: ["Gently, with empathy and a hug", "Rip the bandaid off, fast and direct", "Start with the good news, then sneak it in", "Hire a mariachi band to soften the blow"] },
            { text: "You are trapped in a room with a mime and a clown. Who do you ally with?", options: ["The mime. At least they are quiet.", "The clown. They probably have snacks in those pockets.", "Neither. I am forming my own faction.", "Both. Together we are an unstoppable circus."] },
            { text: "What do you think your last words will be?", options: ["Something poetic and meaningful", "Wait, what?", "I told you so", "Watch this"] },
            { text: "Something that should have been discontinued long ago:", options: ["Candy corn", "Reply all on emails", "Mosquitoes", "The fact that we still do not have hoverboards"] },
            { text: "How would you explain your job to a medieval peasant?", options: ["I push buttons and money appears", "I sit in a room and argue with other people who sit in rooms", "I stare at a glowing rectangle for 8 hours", "I honestly do not understand it myself"] },
            { text: "You find a genie lamp but it is out of wishes. What do you do with the lamp?", options: ["Display it. Conversation piece.", "Sell it to a museum", "Rub it aggressively hoping for a bonus wish", "Use it as a teapot. Maximum disrespect."] },
            { text: "Wardrobe curse: every shirt slightly too small or slightly too big?", options: ["Too small. I will look fit.", "Too big. Comfort above all.", "Too small. Motivation to work out.", "Too big. I am now a cozy wizard."] },
            { text: "You walk into a room full of your exes. Your move:", options: ["Confident wave and direct exit", "Pretend I have the wrong room", "Power stance. I am the main character here.", "U-turn so fast I create a small breeze"] },
            { text: "Your neighbor checks available networks and sees yours:", options: ["FBI Surveillance Van", "Yell PASTA for password", "It Hurts When IP", "The Promised LAN"] },
            { text: "Cupcake consumption method. Choose wisely:", options: ["Peel the wrapper and bite from the top", "Split it in half and make a sandwich with the frosting", "Eat the bottom first, save the frosting", "In one bite if your mouth is committed enough"] },
            { text: "You get to create one new traffic law. It is:", options: ["Mandatory wave when someone lets you merge", "Honking for no reason is a felony", "Speed limit increases if you are running late", "Turn signals are now voice-activated and they yell your intentions"] },
            { text: "If robots could do one thing for you starting tomorrow:", options: ["Folding laundry", "Making small talk", "Deciding what to eat", "Replying to happy birthday messages"] },
            { text: "How would you convince a dragon not to eat you?", options: ["Offer to cook something better", "Appeal to its vanity with compliments", "Negotiate a business partnership", "Pretend to be a fellow dragon having a bad scale day"] },
            { text: "Every wall in your home, one type of art. The vibe:", options: ["Paintings of landscapes (peaceful)", "Abstract art (nobody knows what it means, including me)", "Photos of dogs I do not own", "Movie posters from films that do not exist"] },
            { text: "Kitchen curse: everything you cook is always a bit too salty or a bit too bland?", options: ["Too salty. At least there is flavor.", "Too bland. I will just add hot sauce.", "Too salty. I will drink more water.", "Too bland. I have given up on joy anyway."] },
            { text: "Pick something that should have been invented by now.", options: ["A microwave that also cools things down", "Teleportation for commuting", "A machine that folds fitted sheets", "An alarm clock that wakes you up feeling rested instead of worse"] },
            { text: "You discover your Uber driver is actually a time traveler. You:", options: ["Ask where we are actually going", "Demand to see the future", "Ask if the trip is still going to be $12.50", "Rate them 5 stars. On time across all timelines."] },
            { text: "Power rankings: seats in a car. The throne is:", options: ["Driver (control)", "Shotgun (co-pilot vibes)", "Back middle (power move, nobody does it on purpose)", "Roof (I am making a statement)"] },
            { text: "You are entering witness protection. Your new identity:", options: ["A quiet librarian named Gerald", "A mysterious artist who never talks about their past", "A competitive hot dog eater who moved for the circuit", "Exactly who I am now but with a fake mustache"] },
            { text: "How many consecutive days could you wear the same outfit before someone notices?", options: ["1 day, I would never", "3 days if I am strategic", "A full work week if I avoid everyone", "I have been doing this for years and nobody has said anything"] },
            { text: "Fantasy world commute. Your ride to work:", options: ["Dragon (dramatic, fast)", "Giant eagle (scenic, windswept)", "Teleportation circle (efficient)", "Riding a very large and cooperative frog"] },
            { text: "What happens to the sock that goes missing in the dryer?", options: ["It enters another dimension", "The dryer eats it for sustenance", "It becomes someone else's sock in another timeline", "It is under the machine and I refuse to check"] },
            { text: "You get to choose your own sound effect for walking. What is it?", options: ["Soft piano notes", "Dramatic bass drops with each step", "The clip-clop of horse hooves", "Complete silence. I am now a ninja."] },
            { text: "One luxury hire: personal chef or personal driver?", options: ["Chef. I am tired of deciding what to eat.", "Driver. I hate traffic.", "Chef, because cooking is my weakness", "Driver, so I can nap on the way to work"] },
            { text: "Your business card has a second line under your name. It says:", options: ["Professional Overthinker", "Will give unsolicited advice", "I know what you Googled", "Available for light haunting"] },
            { text: "What would your patronus be if it was based on your personality?", options: ["A golden retriever (loyal, excited, easily distracted)", "A cat (independent, judgmental, napping)", "An owl (wise, or at least I squint like I am)", "A possum (plays dead when confronted)"] },
            { text: "Detectives are coming. Hide it fast. Your spot:", options: ["Inside a hollowed-out book (classic)", "In the junk drawer (nobody can find anything in there)", "Behind the thing in the back of the fridge", "I put it in plain sight and label it DO NOT INVESTIGATE"] },
            { text: "A sentient AI asks you what love is. You explain it as:", options: ["A complex chemical process in the brain", "When someone saves you the last slice of pizza", "The thing that makes you do irrational things for no logical benefit", "I do not know either, buddy. Let me know if you figure it out."] },
            { text: "The most impractical vehicle in your driveway right now:", options: ["A tank (parking would be incredible)", "A hot air balloon (scenic but unreliable)", "A submarine (I do not live near water)", "A zamboni (every road becomes an ice rink)"] },
            { text: "The single most powerful sentence a person can utter:", options: ["I was wrong", "I brought snacks", "I already handled it", "The Wi-Fi password is on the fridge"] },
            { text: "You are now in charge of the weather. First change:", options: ["Rain only happens at night", "Snow days are mandatory once a month", "Perfect 72 degrees every day", "Weather now follows my mood, and yes, that is terrifying"] },
            { text: "Involuntary body feature: a tail that wags when you are happy, or ears that perk up when curious?", options: ["Tail. People deserve to know when I am happy.", "Ears. I want to physically show I am listening.", "Tail, but it would betray me in meetings", "Ears, but they would reveal how often I zone out"] },
            { text: "Pick the ultimate comfort food.", options: ["Mac and cheese (warm hug in a bowl)", "Soup (a classic for a reason)", "Pizza (answers all questions)", "Bread. Just bread. Maybe warm. That is it."] },
            { text: "How would you react if your reflection winked at you?", options: ["Wink back. We are in this together.", "Scream and leave the bathroom", "Test it by making other gestures", "Finally. It took the reflection long enough."] },
            { text: "Last board game on earth. You are stuck with:", options: ["Chess (infinite depth)", "Monopoly (I want to ruin friendships forever)", "Scrabble (I know words)", "Uno (I just want to watch people suffer with Draw 4s)"] },
            { text: "In your will, specifically to confuse your heirs:", options: ["My collection of rubber bands goes to whoever cries the hardest", "To my neighbor: the truth about the garden gnomes", "The treasure is buried under the... (page is torn)", "My Wi-Fi password, finally, as my last act of generosity"] },
            { text: "Most unsettling thing a child has said, unprompted:", options: ["They can hear you", "Why does your face look like that?", "You were in my dream last night", "Do not worry. It will all make sense eventually."] },
            { text: "You have been selected as Earth's ambassador to aliens. Opening line:", options: ["We come in peace, please ignore our history", "Take me to your leader... wait, I AM the leader here", "Can I interest you in our food? That is really our best quality.", "So, funny story about our planet..."] },
            { text: "Lifetime supply of one item. The delivery truck is here:", options: ["Clean socks (never run out)", "Batteries (always prepared)", "Good moods (priceless)", "Audacity (I already have this, actually)"] },
            { text: "Built-in sensor: always know the exact time, or always know the temperature?", options: ["Time. I am always running late.", "Temperature. I want to dress correctly.", "Time. It rules everything.", "Temperature, so I always win the it feels like argument"] },
            { text: "You are creating a new zodiac sign. Its personality trait:", options: ["Aggressively organized", "Chaotic but well-meaning", "Emotionally powered by snacks", "Looks calm but is internally screaming at all times"] },
            { text: "This fly has been in your room for 45 minutes. Status report:", options: ["Open a window and hope for the best", "Methodical hunt with a rolled-up magazine", "Accept cohabitation", "Have a full conversation with it about boundaries"] },

        let categories = [];

        let selectedQuestions = [];
        let answers = [];
        let audioContext = null;
        let audioSource = null;
        let audioBuffer = null;
        let audioGain = null;
        let currentPlaybackRate = 1.0;
        let audioStartTime = 0;
        let audioOffset = 0;

        async function startJeopardySound() {
            if (audioContext) return;

            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                audioGain = audioContext.createGain();
                audioGain.connect(audioContext.destination);

                const response = await fetch('jeopardy-theme.mp3');
                const arrayBuffer = await response.arrayBuffer();
                audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

                playBufferLoop();
            } catch (err) {
                console.error('Audio playback failed:', err);
            }
        }

        function playBufferLoop() {
            if (!audioContext || !audioBuffer) return;
            if (audioSource) {
                try { audioSource.stop(); } catch(e) {}
            }
            audioSource = audioContext.createBufferSource();
            audioSource.buffer = audioBuffer;
            audioSource.loop = true;
            audioSource.playbackRate.value = currentPlaybackRate;
            audioSource.connect(audioGain);
            audioSource.start(0, audioOffset % audioBuffer.duration);
            audioStartTime = audioContext.currentTime;
        }

        function updateAudioSpeed() {
            if (!audioContext || !audioSource) return;
            const progress = currentQuestionIndex / selectedQuestions.length;
            const targetRate = 1 + (progress * 2);
            // Smooth ramp instead of abrupt change — eliminates the "jump"
            audioSource.playbackRate.linearRampToValueAtTime(
                targetRate, audioContext.currentTime + 0.3
            );
            currentPlaybackRate = targetRate;
        }

        function stopJeopardySound() {
            if (audioSource) {
                try {
                    audioGain.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.3);
                    setTimeout(() => {
                        if (audioSource) { try { audioSource.stop(); } catch(e) {} }
                        if (audioContext) { audioContext.close(); }
                        audioContext = null;
                        audioSource = null;
                        audioBuffer = null;
                        audioGain = null;
                        currentPlaybackRate = 1.0;
                        audioOffset = 0;
                    }, 350);
                } catch(e) {
                    audioContext = null;
                    audioSource = null;
                }
            }
        }

        async function fetchCategories() {
            // Broad root categories whose single-word subcategories make good quiz topics
            const roots = [
                'Nature', 'Science', 'Culture', 'Life', 'Society',
                'Geography', 'Food_and_drink', 'Technology', 'People',
                'Universe', 'History', 'Organisms', 'Animals', 'Sports', 'Cuisine'
            ];

            try {
                // Pick 5 random roots and fetch their subcategories in parallel
                const picked = roots.sort(() => Math.random() - 0.5).slice(0, 5);
                const fetches = picked.map(root =>
                    fetch(`https://en.wikipedia.org/w/api.php?action=query&list=categorymembers&cmtitle=Category:${root}&cmtype=subcat&cmlimit=500&format=json&origin=*`)
                        .then(r => r.json())
                        .catch(() => null)
                );
                const results = await Promise.all(fetches);

                const found = new Set();
                for (const data of results) {
                    if (!data?.query?.categorymembers) continue;
                    for (const c of data.query.categorymembers) {
                        const name = c.title.replace('Category:', '');
                        if (!name.includes(' ') && name.length > 3 && name.length < 15) {
                            found.add(name);
                        }
                    }
                }

                if (found.size < 10) throw new Error('Not enough categories found');

                categories = [...found].sort(() => Math.random() - 0.5).slice(0, 25);
                displayCategoryDropdown();
            } catch (error) {
                console.error('Error fetching categories:', error);
                categories = [
                    'Animals', 'Birds', 'Countries', 'Foods', 'Colors',
                    'Sports', 'Games', 'Instruments', 'Planets', 'Mountains',
                    'Trees', 'Flowers', 'Rivers', 'Cities', 'Weapons',
                    'Languages', 'Vehicles', 'Tools', 'Metals', 'Mammals',
                    'Fish', 'Dinosaurs', 'Films', 'Books', 'Islands'
                ];
                displayCategoryDropdown();
            }
        }

        function singularize(word) {
            if (!word || word.length < 3) return word;
            const lower = word.toLowerCase();

            // --- Irregular plurals ---
            const irregulars = {
                // Core irregulars
                'children': 'child', 'men': 'man', 'women': 'woman',
                'mice': 'mouse', 'geese': 'goose', 'teeth': 'tooth',
                'feet': 'foot', 'oxen': 'ox', 'lice': 'louse',
                'people': 'person', 'dice': 'die',
                // Latin -i → -us
                'cacti': 'cactus', 'fungi': 'fungus', 'alumni': 'alumnus',
                'stimuli': 'stimulus', 'nuclei': 'nucleus', 'radii': 'radius',
                'foci': 'focus', 'loci': 'locus', 'syllabi': 'syllabus',
                // Latin/Greek -a → -um/-on
                'criteria': 'criterion', 'phenomena': 'phenomenon',
                'bacteria': 'bacterium', 'media': 'medium',
                'curricula': 'curriculum', 'memoranda': 'memorandum',
                'strata': 'stratum', 'data': 'datum', 'errata': 'erratum',
                'addenda': 'addendum', 'corrigenda': 'corrigendum',
                // Latin -ae → -a
                'antennae': 'antenna', 'formulae': 'formula',
                'larvae': 'larva', 'algae': 'alga', 'vertebrae': 'vertebra',
                'minutiae': 'minutia', 'nebulae': 'nebula',
                // -ves → -f/-fe
                'wolves': 'wolf', 'knives': 'knife', 'lives': 'life',
                'wives': 'wife', 'leaves': 'leaf', 'halves': 'half',
                'calves': 'calf', 'shelves': 'shelf', 'thieves': 'thief',
                'loaves': 'loaf', 'scarves': 'scarf', 'elves': 'elf',
                'dwarves': 'dwarf', 'hooves': 'hoof', 'wharves': 'wharf',
                // Greek -ses → -sis
                'analyses': 'analysis', 'crises': 'crisis', 'theses': 'thesis',
                'diagnoses': 'diagnosis', 'oases': 'oasis', 'synopses': 'synopsis',
                'hypotheses': 'hypothesis', 'parentheses': 'parenthesis',
                'ellipses': 'ellipsis', 'neuroses': 'neurosis',
                'bases': 'basis', 'axes': 'axis', 'nemeses': 'nemesis',
                'psychoses': 'psychosis', 'prognoses': 'prognosis',
                // -ices → -ex/-ix
                'indices': 'index', 'vertices': 'vertex', 'matrices': 'matrix',
                'appendices': 'appendix', 'vortices': 'vortex', 'cortices': 'cortex',
                'codices': 'codex', 'helices': 'helix', 'apices': 'apex',
                // -ie plurals (singular ends in -ie, NOT consonant+y)
                'movies': 'movie', 'zombies': 'zombie', 'brownies': 'brownie',
                'cookies': 'cookie', 'calories': 'calorie', 'genies': 'genie',
                'goalies': 'goalie', 'groupies': 'groupie', 'hoodies': 'hoodie',
                'rookies': 'rookie', 'smoothies': 'smoothie', 'selfies': 'selfie',
                'veggies': 'veggie', 'birdies': 'birdie', 'collies': 'collie',
                'newbies': 'newbie', 'magpies': 'magpie', 'prairies': 'prairie',
                'eeries': 'eerie', 'sorties': 'sortie', 'reveries': 'reverie',
                'lingeries': 'lingerie', 'menageries': 'menagerie',
                'bourgeoisies': 'bourgeoisie',
                // Consonant-doubling plurals
                'quizzes': 'quiz', 'fezzes': 'fez',
                // -s where base ends in consonant (not -e)
                'buses': 'bus', 'gases': 'gas', 'atlases': 'atlas',
                'lenses': 'lens', 'campuses': 'campus', 'bonuses': 'bonus',
                'viruses': 'virus', 'choruses': 'chorus', 'focuses': 'focus',
                'genuses': 'genus', 'radiuses': 'radius', 'censuses': 'census',
                'circuses': 'circus', 'corpuses': 'corpus', 'fetuses': 'fetus',
                'funguses': 'fungus', 'platypuses': 'platypus',
                'statuses': 'status', 'syllabuses': 'syllabus',
                'surpluses': 'surplus', 'consensuses': 'consensus',
            };

            if (irregulars[lower]) {
                const result = irregulars[lower];
                if (word[0] === word[0].toUpperCase()) {
                    return result[0].toUpperCase() + result.slice(1);
                }
                return result;
            }

            // --- Unchanged (same singular and plural) ---
            const unchanged = new Set([
                'fish', 'sheep', 'deer', 'moose', 'bison', 'salmon', 'trout',
                'shrimp', 'swine', 'aircraft', 'series', 'species', 'means',
                'offspring', 'corps', 'barracks', 'gallows', 'headquarters',
                'crossroads', 'chassis', 'debris', 'news', 'mathematics',
                'physics', 'economics', 'electronics', 'politics', 'athletics',
                'linguistics', 'gymnastics', 'logistics', 'ethics', 'genetics',
                'ceramics', 'cosmetics', 'dynamics', 'graphics', 'mechanics',
                'optics', 'robotics', 'statistics', 'tactics', 'thermodynamics',
                'blues', 'scissors', 'pliers', 'tongs', 'tweezers',
            ]);
            if (unchanged.has(lower)) return word;

            // --- Already-singular endings: don't touch ---
            if (lower.endsWith('ss')) return word;
            if (lower.endsWith('us')) return word;
            if (lower.endsWith('is')) return word;

            // --- Rules in priority order ---

            // -ies → -y (cities→city, countries→country)
            // Length guard: "dies"/"pies" (4 chars) fall through to -es rule correctly
            if (lower.endsWith('ies') && lower.length > 4) {
                return word.slice(0, -3) + 'y';
            }

            // -oes → -o for words where singular has no trailing -e
            const oesToO = new Set([
                'potatoes', 'tomatoes', 'heroes', 'volcanoes', 'echoes',
                'torpedoes', 'vetoes', 'dominoes', 'mosquitoes', 'cargoes',
                'buffaloes', 'flamingoes', 'mangoes', 'tornadoes', 'embargoes',
            ]);
            if (oesToO.has(lower)) return word.slice(0, -2);

            // -sses → -ss (glasses→glass, grasses→grass)
            if (lower.endsWith('sses')) return word.slice(0, -2);

            // -ches → -ch (churches→church, watches→watch)
            if (lower.endsWith('ches')) return word.slice(0, -2);

            // -shes → -sh (dishes→dish, bushes→bush)
            if (lower.endsWith('shes')) return word.slice(0, -2);

            // -xes → -x (boxes→box, foxes→fox)
            if (lower.endsWith('xes')) return word.slice(0, -2);

            // -zes → -ze handled by -es rule below (mazes→maze, blazes→blaze)

            // -es → drop the -s (games→game, trees→tree, cheeses→cheese)
            if (lower.endsWith('es')) return word.slice(0, -1);

            // -s → drop -s (animals→animal, birds→bird)
            if (lower.endsWith('s')) return word.slice(0, -1);

            return word;
        }

        async function getAllCategoryMembers(category, maxPages = 1000) {
            let allMembers = [];
            let continueToken = null;
            
            do {
                const params = new URLSearchParams({
                    action: 'query',
                    list: 'categorymembers',
                    cmtitle: `Category:${category}`,
                    cmlimit: 100,
                    cmtype: 'page',
                    cmnamespace: 0,
                    cmsort: 'sortkey',
                    format: 'json',
                    origin: '*'
                });
                
                if (continueToken) {
                    params.append('cmcontinue', continueToken);
                }
                
                const response = await fetch(`https://en.wikipedia.org/w/api.php?${params}`);
                const data = await response.json();
                
                if (data.query && data.query.categorymembers) {
                    allMembers = allMembers.concat(data.query.categorymembers);
                }
                
                // Check if there are more results
                continueToken = data.continue ? data.continue.cmcontinue : null;
                
                // Stop if we've reached maxPages
                if (allMembers.length >= maxPages) {
                    allMembers = allMembers.slice(0, maxPages);
                    break;
                }
                
            } while (continueToken);
            
            return allMembers;
        }

        async function showResults() {
            stopJeopardySound();
            
            const quizScreen = document.getElementById('quizScreen');
            const resultScreen = document.getElementById('resultScreen');
            
            quizScreen.classList.remove('show');
            quizScreen.classList.add('fade-out');
            
            setTimeout(() => {
                quizScreen.style.display = 'none';
                quizScreen.classList.remove('fade-out');
                resultScreen.classList.add('show');
            }, 800);
            
            document.getElementById('resultTitle').textContent = 'Calculating your result...';
            
            const hash = answers.reduce((acc, val, idx) => acc + val * (idx + 1), 0);
            
            try {
                const response = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=categorymembers&cmtitle=Category:${encodeURIComponent(selectedCategory)}&cmlimit=100&cmtype=page&cmnamespace=0&cmsort=sortkey&format=json&origin=*`);
                const data = await response.json();
                
                if (!data.query || !data.query.categorymembers || data.query.categorymembers.length === 0) {
                    throw new Error('No members found in category');
                }
                
                const members = data.query.categorymembers;
                
                // Filter out disambiguation pages, lists, redirects, and subsections
                const filteredMembers = members.filter(m => 
                    !m.title.includes('(disambiguation)') &&
                    !m.title.toLowerCase().includes('list of') &&
                    !m.title.includes('/') &&  // Remove subsections
                    !m.title.includes(':') &&  // Remove special pages
                    !m.title.toLowerCase().includes('index of') &&
                    !m.title.toLowerCase().includes('outline of') &&
                    !m.title.toLowerCase().includes('glossary of')
                );
                
                if (filteredMembers.length === 0) {
                    throw new Error('No suitable members found');
                }
                
                const index = hash % filteredMembers.length;
                const selectedMember = filteredMembers[index];
                
                await displayResult(selectedMember.title);
            } catch (error) {
                console.error('Error fetching category members:', error);
                
                try {
                    const searchResponse = await fetch(`https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(selectedCategory)}&limit=50&namespace=0&format=json&origin=*`);
                    const searchData = await searchResponse.json();
                    
                    if (searchData[1] && searchData[1].length > 0) {
                        const filteredTitles = searchData[1].filter(title => 
                            !title.toLowerCase().includes('list of') &&
                            !title.toLowerCase().includes('category:') &&
                            !title.includes('/') &&
                            !title.includes(':') &&
                            !title.toLowerCase().includes('index of') &&
                            !title.toLowerCase().includes('outline of') &&
                            !title.toLowerCase().includes('glossary of') &&
                            title.toLowerCase() !== selectedCategory.toLowerCase()
                        );
                        
                        if (filteredTitles.length > 0) {
                            const index = hash % filteredTitles.length;
                            const selectedTitle = filteredTitles[index];
                            await displayResult(selectedTitle);
                            return;
                        }
                    }
                } catch (fallbackError) {
                    console.error('Fallback search failed:', fallbackError);
                }
                
                document.getElementById('resultTitle').textContent = `You are related to ${selectedCategory}!`;
                document.getElementById('resultSummary').textContent = 'Unfortunately, we couldn\'t find a specific result from Wikipedia. Try another category!';
                document.getElementById('wikiLink').style.display = 'none';
            }
        }

        async function displayResult(title) {
            try {
                const response = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=extracts|pageimages&exintro=1&explaintext=1&pithumbsize=500&format=json&origin=*`);
                const data = await response.json();
                const page = Object.values(data.query.pages)[0];
                
                document.getElementById('resultTitle').textContent = `You are: ${page.title}!`;
                
                if (page.thumbnail) {
                    const img = document.getElementById('resultImage');
                    img.src = page.thumbnail.source;
                    img.style.display = 'block';
                }
                
                const summary = page.extract || 'No summary available.';
                document.getElementById('resultSummary').textContent = summary.substring(0, 500) + (summary.length > 500 ? '...' : '');
                
                document.getElementById('wikiLink').href = `https://en.wikipedia.org/wiki/${encodeURIComponent(page.title)}`;
            } catch (error) {
                console.error('Error fetching article:', error);
                document.getElementById('resultTitle').textContent = `You are: ${title}!`;
            }
        }

        document.getElementById('nextButton').addEventListener('click', () => {
            const selected = document.querySelector('.option.selected');
            if (selected) {
                answers.push(parseInt(selected.dataset.index));
                currentQuestionIndex++;
                
                updateAudioSpeed();
                
                if (currentQuestionIndex < selectedQuestions.length) {
                    displayQuestion();
                } else {
                    showResults();
                }
            }
        });

        document.getElementById('homeButton').addEventListener('click', (e) => {
            e.preventDefault();
            location.reload();
        });

        fetchCategories();
    </script>
</body>
</html>
