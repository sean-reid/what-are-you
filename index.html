<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What ____ Are You?</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='3' fill='%23818cf8'/%3E%3Ctext x='16' y='24' text-anchor='middle' font-family='system-ui,sans-serif' font-size='22' font-weight='bold' fill='%230f0f13'%3E%3F%3C/text%3E%3C/svg%3E">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f13;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            max-width: 640px;
            width: 100%;
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 8px;
            padding: 28px 24px;
        }

        @media (min-width: 768px) {
            .container {
                padding: 48px 44px;
            }
        }

        .title-screen {
            text-align: center;
            opacity: 1;
            transition: opacity 0.6s ease-out;
        }

        .title-screen.fade-out {
            opacity: 0;
        }

        h1 {
            font-size: 1.1em;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.92);
            margin-bottom: 24px;
            line-height: 1.3;
            white-space: nowrap;
            letter-spacing: -0.02em;
        }

        @media (min-width: 480px) {
            h1 { font-size: 1.5em; }
        }

        @media (min-width: 768px) {
            h1 { font-size: 2em; }
        }

        .category-blank {
            display: inline-block;
            width: 10ch;
            text-align: center;
            vertical-align: bottom;
            position: relative;
            cursor: pointer;
            color: #818cf8;
            overflow: hidden;
            text-overflow: ellipsis;
            height: 1.3em;
        }

        @media (min-width: 480px) {
            .category-blank { width: 12ch; }
        }

        @media (min-width: 768px) {
            .category-blank { width: 14ch; }
        }

        .category-blank::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 2px;
            background: #818cf8;
        }

        .category-blank.has-dropdown::before {
            content: '\25BE';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.6em;
            color: rgba(129, 140, 248, 0.5);
            pointer-events: none;
        }

        select {
            font: inherit;
            letter-spacing: inherit;
            line-height: inherit;
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            border: none;
            border-radius: 0;
            background: transparent;
            color: inherit;
            cursor: pointer;
            outline: none;
            text-align: center;
            text-align-last: center;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        .category-selected {
            color: inherit;
        }

        .quiz-screen, .result-screen {
            display: none;
            opacity: 0;
            transition: opacity 0.6s ease-in;
        }

        .quiz-screen.show, .result-screen.show {
            display: block;
            opacity: 1;
        }

        .question-container {
            margin-bottom: 28px;
        }

        .question-number {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.8em;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }

        @media (min-width: 768px) {
            .question-number { font-size: 0.82em; margin-bottom: 12px; }
        }

        .question-text {
            font-size: 1.1em;
            font-weight: 500;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.5;
        }

        @media (min-width: 768px) {
            .question-text { font-size: 1.2em; margin-bottom: 24px; }
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            padding: 12px 16px;
            border: 1px solid #27272a;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 0.95em;
            font-weight: 400;
            line-height: 1.4;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        @media (min-width: 768px) {
            .option { font-size: 1em; }
        }

        .option:hover {
            border-color: #3f3f46;
            background: rgba(255, 255, 255, 0.03);
        }

        .option:active {
            transform: scale(0.985);
        }

        .option.selected {
            background: rgba(129, 140, 248, 0.1);
            color: #c7d2fe;
            border-color: #818cf8;
        }

        .next-button {
            margin-top: 20px;
            padding: 12px 28px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 0.95em;
            font-weight: 600;
            background: #818cf8;
            color: #0f0f13;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
            width: 100%;
            touch-action: manipulation;
            letter-spacing: -0.01em;
        }

        @media (min-width: 768px) {
            .next-button { margin-top: 24px; padding: 12px 32px; width: auto; }
        }

        .next-button:hover {
            background: #a5b4fc;
        }

        .next-button:active {
            transform: scale(0.98);
        }

        .next-button:disabled {
            background: #27272a;
            color: rgba(255, 255, 255, 0.15);
            cursor: not-allowed;
            transform: none;
        }

        .result-image {
            max-width: 100%;
            max-height: 340px;
            object-fit: cover;
            height: auto;
            border-radius: 4px;
            margin-bottom: 24px;
        }

        .result-title {
            font-size: 1.5em;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.92);
            margin-bottom: 16px;
            line-height: 1.3;
            word-wrap: break-word;
            letter-spacing: -0.02em;
        }

        @media (min-width: 768px) {
            .result-title { font-size: 2em; }
        }

        .result-summary {
            font-size: 0.95em;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 28px;
        }

        @media (min-width: 768px) {
            .result-summary { font-size: 1em; }
        }

        .result-link {
            display: inline-block;
            padding: 10px 22px;
            background: #818cf8;
            color: #0f0f13;
            text-decoration: none;
            border-radius: 4px;
            margin-right: 10px;
            margin-bottom: 10px;
            transition: all 0.15s ease;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 0.9em;
            font-weight: 600;
            touch-action: manipulation;
        }

        .result-link:last-child {
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid #27272a;
        }

        .result-link:last-child:hover {
            border-color: #3f3f46;
            color: rgba(255, 255, 255, 0.7);
        }

        @media (min-width: 768px) {
            .result-link { font-size: 0.95em; }
        }

        .result-link:hover {
            background: #a5b4fc;
        }

        .result-link:active {
            transform: scale(0.98);
        }

.progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 2px;
            margin-bottom: 28px;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .progress-bar { margin-bottom: 32px; }
        }

        .progress-fill {
            height: 100%;
            background: #818cf8;
            border-radius: 2px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title-screen" id="titleScreen">
            <h1>What <span class="category-blank" id="categoryBlank">&nbsp;</span> Are You?</h1>
        </div>

        <div class="quiz-screen" id="quizScreen">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="question-container" id="questionContainer"></div>
            <button class="next-button" id="nextButton" disabled>Next Question</button>
        </div>

        <div class="result-screen" id="resultScreen">
            <img class="result-image" id="resultImage" style="display: none;">
            <h2 class="result-title" id="resultTitle"></h2>
            <p class="result-summary" id="resultSummary"></p>
            <a class="result-link" id="wikiLink" target="_blank">Read More on Wikipedia</a>
            <a class="result-link" href="#" id="homeButton">Take Another Quiz</a>
        </div>
    </div>

    <script>
        const questions = [
            { text: "You wake up and you are 3 inches tall. What is your first move?", options: ["Ride the cat like a horse", "Build a fort out of Legos and declare sovereignty", "Climb into the fridge and live off cheese", "Challenge a squirrel to single combat"] },
            { text: "If you had to fight a historical figure, who would you choose?", options: ["Gandhi (seems beatable on paper)", "Abraham Lincoln (reach disadvantage)", "Napoleon (short king energy)", "Rasputin (literally unkillable)"] },
            { text: "Pick a suspicious activity.", options: ["Buying 40 watermelons at 3 AM", "Standing in a field holding a single shoe", "Whispering to a vending machine", "Owning a ladder but no house"] },
            { text: "You get one useless superpower. Which do you pick?", options: ["Ability to sense when someone is thinking about soup", "Can fly, but only 2 inches off the ground", "Turn invisible, but only when nobody is looking", "Communicate with plants (they are passive-aggressive)"] },
            { text: "Is a hot dog a sandwich?", options: ["Yes, structurally undeniable", "No, and I will die on this hill", "It is a taco, actually", "A hot dog is a state of mind"] },
            { text: "A raccoon breaks into your house and sits on your couch. What do you do?", options: ["Offer it a snack and see what happens", "Call animal control like a responsible adult", "Sit next to it and watch TV together", "Challenge it for dominance of the couch"] },
            { text: "Your boss catches you talking to a plant. You say:", options: ["It is a work call, the plant is my supervisor", "I was practicing my presentation", "Nothing. Maintain eye contact. Keep talking to the plant.", "The plant started it"] },
            { text: "Pick the word that speaks to your soul.", options: ["Crisp", "Lurk", "Wobble", "Defenestration"] },
            { text: "How would you load a dishwasher?", options: ["With military precision and a system", "Tetris style, maximum capacity", "Just shove everything in, it will figure it out", "I hand-wash because I do not trust machines"] },
            { text: "You can time travel once. Where do you go?", options: ["The future to steal lottery numbers", "Ancient Rome to see the chaos firsthand", "Last Tuesday to fix that thing I said", "The day before time travel was invented, to prevent it"] },
            { text: "What is your most controversial food opinion?", options: ["Cereal is soup", "Pizza is better cold", "Water has different flavors depending on the brand", "Ketchup on everything, including ice cream"] },
            { text: "An alien lands in your backyard and asks you to explain humanity. You show them:", options: ["A cooking show", "A 10-hour YouTube compilation of cats", "A Terms of Service agreement", "Competitive hot dog eating footage"] },
            { text: "Would you rather have fingers for toes or toes for fingers?", options: ["Fingers for toes, I want dexterous feet", "Toes for fingers, embrace the weird", "Neither, I would simply refuse", "Both, become an evolutionary wildcard"] },
            { text: "What kind of villain would you be?", options: ["The monologuing mastermind", "The incompetent but lovable one", "The one who thinks they are the hero", "The kind that gets defeated by a child and a golden retriever"] },
            { text: "How many raccoons could you befriend in a single week?", options: ["Zero, raccoons do not respect me", "3-5 with enough trail mix", "A whole colony if I commit", "I already have a raccoon army"] },
            { text: "You are being chased. What is your go-to escape strategy?", options: ["Sprint and never look back", "Hide in the nearest bathroom", "Pretend to be someone else mid-chase", "Turn around and chase them instead"] },
            { text: "Pick a conspiracy theory to start.", options: ["Pigeons are government surveillance drones", "The moon is a giant egg", "All mattress stores are money laundering fronts", "Dentists invented candy"] },
            { text: "You can only eat foods of one texture for the rest of your life. Which?", options: ["Crunchy (chips, apples, toast)", "Smooth (pudding, soup, mashed potatoes)", "Chewy (bread, steak, gummy bears)", "Liquid (everything is now a smoothie)"] },
            { text: "What is your spirit appliance?", options: ["A toaster: simple, warm, occasionally on fire", "A Roomba: chaotic, bumping into everything", "A pressure cooker: calm exterior, ready to blow", "A broken printer: unpredictable and rage-inducing"] },
            { text: "The zombie apocalypse starts. What is your first move?", options: ["Raid a Costco and barricade the doors", "Head to an island immediately", "Form a ragtag group of survivors with good vibes", "Become the zombie. Less stressful."] },
            { text: "Wet socks: what is the verdict?", options: ["Mild inconvenience", "Genuine emotional damage", "I would rather walk barefoot on gravel", "I seek them out. I am the puddle."] },
            { text: "You discover you have been sleepwalking. What is the worst place you could wake up?", options: ["The roof of a Denny's", "Inside a stranger's parked car", "On stage at a school play, in costume", "In a forest, holding a trophy you do not recognize"] },
            { text: "Pick a hill to die on.", options: ["The Oxford comma matters", "Boneless wings are just nuggets", "Pluto is a planet and always will be", "Water is wet"] },
            { text: "Would you rather fight one horse-sized duck or a hundred duck-sized horses?", options: ["One big duck. Fewer targets.", "A hundred tiny horses. I like my odds.", "I would negotiate a peace treaty", "Fight them all at the same time. Glory awaits."] },
            { text: "If your life had a theme song, what genre would it be?", options: ["Dramatic orchestral", "Upbeat lo-fi", "Chaotic ska punk", "Elevator music on a loop"] },
            { text: "What would your autobiography be called?", options: ["Almost Had It Together", "A Series of Questionable Decisions", "No Refunds", "I Thought That Was Decaf"] },
            { text: "You find a door in your house that you have never noticed before. You:", options: ["Open it immediately, no hesitation", "Knock first, obviously", "Board it up and pretend you never saw it", "Move to a new house and tell no one"] },
            { text: "Corn on the cob technique. Describe yours:", options: ["Typewriter style, row by row", "Circular rotation like a lathe", "Cut it off with a knife like a civilized human", "Just bite directly into the center"] },
            { text: "Red flag or green flag: someone has a sword collection.", options: ["Green flag. That is commitment to a hobby.", "Red flag. What are they preparing for?", "Depends entirely on whether they have named the swords", "I also have a sword collection so this is perfect"] },
            { text: "You are stuck in a time loop of one day forever. What day do you pick?", options: ["A perfect Saturday with no responsibilities", "Christmas morning, infinite presents", "The day before a math test so I never have to take it", "A random Tuesday. Chaos has no schedule."] },
            { text: "What is your honest relationship with your check engine light?", options: ["I address it promptly", "I put tape over it", "We have an understanding. I ignore it, it judges me.", "My car is a check engine light with wheels attached"] },
            { text: "You can add one absurd law to your country. What is it?", options: ["Mandatory finger guns when greeting someone", "All meetings must include a live goat", "Socks with sandals carry a life sentence", "Every fourth Thursday is legally backwards day"] },
            { text: "Someone offers you a mystery box or $50. You take:", options: ["The money. I am not a fool.", "The box. Could be anything. Could even be $50.", "I demand to shake the box first", "I take both and run"] },
            { text: "You are hopelessly lost. Now what?", options: ["Pull up GPS like a normal person", "Refuse to ask for directions out of pride", "Wander confidently in the wrong direction", "Declare wherever I am to be the new destination"] },
            { text: "Pick a fake degree to hang on your wall.", options: ["PhD in Overthinking", "Masters in Napping", "Bachelor of Suspicious Behavior", "Doctorate of Unsolicited Opinions"] },
            { text: "You accidentally make eye contact with someone on public transit. You:", options: ["Look away immediately", "Nod politely", "Stare back to assert dominance", "Start a conversation about their shoes"] },
            { text: "Would you rather always be 10 minutes late or 20 minutes early?", options: ["10 minutes late. Fashionable entrance.", "20 minutes early. I like sitting in parking lots.", "Late. Time is a construct.", "Early, so I can scope out the exits."] },
            { text: "Your fridge gains sentience. Its first complaint is:", options: ["You never close the door fast enough", "Stop putting me on a diet", "That thing in the back has been there since 2019", "Why do you open me and just stare"] },
            { text: "What is your strategy for avoiding someone you know at the grocery store?", options: ["Aggressive aisle switching", "Sudden phone call to nobody", "Put on sunglasses indoors", "Abandon cart and leave the store"] },
            { text: "You have to give a TED Talk in 24 hours. Your topic:", options: ["Why socks disappear in the dryer: a conspiracy", "The optimal number of pillows for a bed", "How to look busy at work while doing nothing", "A passionate defense of gas station sushi"] },
            { text: "What is your alignment when it comes to putting away laundry?", options: ["Lawful good: folded and in drawers immediately", "Neutral: it lives in the basket now", "Chaotic neutral: the floor is a drawer", "Chaotic evil: I just buy new clothes"] },
            { text: "An elevator is stuck. You are in it with a stranger. What happens?", options: ["Polite small talk and mutual anxiety", "Complete silence. We do not acknowledge each other.", "We become best friends by the time the doors open", "I start narrating the situation like a documentary"] },
            { text: "You can only communicate in one movie quote for a week. Which movie?", options: ["The Godfather (dramatic and versatile)", "Mean Girls (surprisingly applicable to daily life)", "Shrek (for every occasion)", "Bee Movie (aggressively niche)"] },
            { text: "Pick your chaos alignment for assembling furniture.", options: ["Lawful good: read instructions cover to cover", "Chaotic good: use instructions as a suggestion", "Lawful evil: build it wrong on purpose to see what happens", "Chaotic evil: throw out instructions, use a hammer for everything"] },
            { text: "You are given a goat. What do you do?", options: ["Research goat care immediately", "Name it and let it roam free in my apartment", "Start a small cheese business", "Form a bond so deep it becomes my emergency contact"] },
            { text: "What is the most concerning number of bananas to buy at once?", options: ["1 (what are you, a surgeon?)", "13 (oddly specific)", "50+ (are you feeding an army?)", "Zero, but you aggressively handle several before leaving"] },
            { text: "Would you rather have a rewind button or a pause button for life?", options: ["Rewind. So many things to fix.", "Pause. I need more nap time.", "Rewind, but only for conversations", "Pause, but only to eat snacks in peace"] },
            { text: "You walk into your kitchen at 3 AM and a possum is eating your cereal. You:", options: ["Slowly back away", "Pour yourself a bowl and join", "Negotiate shared custody of the cereal", "Assert dominance by eating their cereal"] },
            { text: "Pick a fictional job.", options: ["Professional cloud namer", "Haunted house interior decorator", "Penguin marriage counselor", "Conspiracy theory quality assurance manager"] },
            { text: "What is your relationship with your phone at 2% battery?", options: ["Panic. Immediate outlet search.", "Accept my fate peacefully", "I will make these 2 percent last 4 hours", "My phone is always at 2 percent. We live here now."] },
            { text: "You can replace one body part with a gadget. Which?", options: ["Eyes with zoom lenses", "Arm with a Swiss Army knife", "Legs with wheels", "Stomach with a wood-fired pizza oven"] },
            { text: "The plane lands. Someone claps. Your reaction:", options: ["Charming optimism", "Mildly embarrassing", "A war crime", "I am those people and I will not apologize"] },
            { text: "You get to haunt one specific location as a ghost. Where?", options: ["A library, slamming books dramatically", "An IKEA, rearranging furniture displays", "A fast food drive-through speaker", "My enemies' bathroom mirror"] },
            { text: "Pick a useless talent you wish you had.", options: ["Ability to always guess the exact time", "Can identify any cheese by smell", "Perfectly mimic any animal sound", "Fold a fitted sheet on the first try"] },
            { text: "The last text you sent is now your campaign slogan. How screwed are you?", options: ["Completely fine, I text like a politician", "Mildly concerning but relatable", "I would lose by a historic margin", "I would win, and that is even more concerning"] },
            { text: "You can only sit in one type of chair for the rest of your life. Which?", options: ["A really good office chair", "Bean bag, always", "Lawn chair, indoors and out", "A throne made of lesser chairs"] },
            { text: "Would you rather know every language or every instrument?", options: ["Every language. Global domination.", "Every instrument. I want a one-person band.", "Languages. I want to eavesdrop internationally.", "Instruments, but I only play them badly on purpose"] },
            { text: "A genie gives you three wishes but they all have to be boring. You wish for:", options: ["Perfect credit score, no traffic, good posture", "Always having exact change, no hangnails, perfect Wi-Fi", "Fitting into airplane seats, no more hiccups, stain-proof clothes", "My wishes are never boring. I argue with the genie."] },
            { text: "What is your strategy for eating a burrito?", options: ["Calculated, architectural grip technique", "Lean forward and accept the mess", "Fork and knife like a monster", "Unhinge jaw like a snake and commit"] },
            { text: "You are legally required to get a face tattoo. What is it?", options: ["A very tasteful teardrop", "A Comic Sans inspirational quote", "A photorealistic spider", "A second, smaller face"] },
            { text: "You have to enter a talent show tonight. Your act:", options: ["Aggressive PowerPoint presentation", "Dramatic reading of a terms and conditions", "Interpretive dance to dial-up internet sounds", "I simply stand there with incredible confidence"] },
            { text: "Pick a way to enter a room.", options: ["Normal walk, slight nod", "Kick the door open regardless of context", "Slide in like I am on a sitcom", "Materialize from the shadows mid-conversation"] },
            { text: "What is the ideal number of pillows on a bed?", options: ["2, like a rational person", "4-5, cozy and practical", "8+, I am building a nest", "One extremely long pillow. A body pillow. Named Gerald."] },
            { text: "You discover your new coworker is actually three kids in a trench coat. You:", options: ["Mind my own business, they seem to be doing fine", "Report it to HR, baffled", "Offer to be the fourth kid", "Blackmail them for their lunch money"] },
            { text: "Would you rather have a personal narrator or a personal soundtrack?", options: ["Narrator. I want Morgan Freeman judging my choices.", "Soundtrack. My life needs dramatic music.", "Narrator, but they are unreliable and lie constantly", "Soundtrack, but it is only one song and I do not get to pick"] },
            { text: "How many tabs do you have open in your browser right now?", options: ["Under 10, like a functional human", "10-30, a curated chaos", "30-100, I am conducting research", "My browser has achieved sentience and is begging for mercy"] },
            { text: "You find a briefcase full of cash. No cameras, no witnesses. You:", options: ["Turn it in. Sleep easy.", "Take it. No ethical concerns whatsoever.", "Take half. Compromise is key.", "Open it, find it is all ones, and feel personally insulted"] },
            { text: "What is your shower thought frequency?", options: ["Never. Showers are for showering.", "Occasional philosophical breakthrough", "Daily existential crisis, water helps", "I have solved world hunger in the shower at least twice"] },
            { text: "You can only describe things using one sense. Which?", options: ["Sight (classic, reliable)", "Sound (surprisingly descriptive)", "Smell (oddly intimate)", "Taste (everything is flavor now)"] },
            { text: "Someone brings a guitar to a party. Your reaction:", options: ["Genuine excitement", "Polite tolerance", "I leave immediately", "I brought a bigger guitar"] },
            { text: "What kind of ghost would you be?", options: ["The chill one who just vibes in the attic", "The dramatic one who slams doors at 3 AM", "The helpful one who does your dishes", "The petty one who hides exactly one sock from every pair"] },
            { text: "Would you rather always have to whisper or always have to shout?", options: ["Whisper. Mysterious and alluring.", "Shout. I have things to say.", "Whisper, but aggressively", "Shout. Every conversation is now a wrestling promo."] },
            { text: "Pick a weird thing to be world champion of.", options: ["Competitive staring", "Speed-folding towels", "Guessing the weight of any dog", "Eating the most grapes in 30 seconds"] },
            { text: "Your GPS gains a personality. It is:", options: ["Passive-aggressive about your route choices", "Overly supportive and cheering you on", "Existentially depressed about going in circles", "Actively trying to get you lost for fun"] },
            { text: "You have to live inside one store for a month. Which?", options: ["IKEA (furniture and meatballs)", "Costco (bulk survival)", "Target (vibes and variety)", "Home Depot (I will build my own house inside)"] },
            { text: "How would you describe your texting style?", options: ["Full sentences with punctuation", "Lowercase stream of consciousness", "Voice memos only", "Single word replies that somehow convey everything"] },
            { text: "You are now a wizard but your spells are all slightly wrong. Pick one:", options: ["Fireball but it is lukewarm", "Invisibility but only my clothes disappear", "Teleportation but always 3 feet to the left", "Mind reading but only hear what people had for lunch"] },
            { text: "You accidentally started a cult. The motto on the banner reads:", options: ["We do not ask questions, we ask vibes", "The answer is always more cheese", "Sleep is optional, chaos is mandatory", "If it fits, it ships"] },
            { text: "You can domesticate one wild animal. Which?", options: ["A bear (ultimate guard dog)", "A crow (smart and brings gifts)", "A fox (cute and slightly untrustworthy)", "A komodo dragon (nobody visits uninvited)"] },
            { text: "What is the most chaotic thing in your search history?", options: ["Can you microwave a microwave", "How many bones does a baby have (concerning)", "Is it illegal to own a penguin", "Why does my elbow taste like that"] },
            { text: "You wake up as your pet for one day. Your plan:", options: ["Finally nap without guilt", "Knock something off a table to see how it feels", "Eat whatever I want with no consequences", "Stare at my owner and judge their life choices"] },
            { text: "A wasp just entered the room. Battle stations:", options: ["Calmly open a window and guide it out", "Freeze and wait for it to leave on its own", "Full combat mode with a rolled-up magazine", "Leave the room. It lives there now."] },
            { text: "Name an irrational fear you are willing to defend:", options: ["Cotton balls", "The sound of styrofoam", "Revolving doors", "That one chair in the corner at night"] },
            { text: "Would you rather have no taste buds or no sense of smell?", options: ["No taste. I will eat healthy effortlessly.", "No smell. Some things are better left unsmelled.", "No taste, because I would still enjoy textures", "No smell, because my cooking would stay the same either way"] },
            { text: "If you could witness any event in history, which?", options: ["The building of the pyramids", "The first moonwalk", "The moment someone decided to eat a lobster", "The exact second someone invented pants"] },
            { text: "What do you do when someone sings Happy Birthday to you?", options: ["Smile politely and wait for death", "Conduct an invisible orchestra", "Stare into the void of the candles", "Harmonize aggressively and upstage everyone"] },
            { text: "You have to pick a new way to greet people permanently. Which?", options: ["Firm handshake (classic)", "Bow like a samurai (respectful)", "Finger guns with a clicking sound (fun)", "Full sprint and chest bump (commitment)"] },
            { text: "A stranger on the street hands you a pineapple and says nothing. You:", options: ["Accept it gracefully and walk away", "Ask follow-up questions immediately", "Hand them something in return", "Eat it right there, maintaining eye contact"] },
            { text: "What is the correct amount of ranch dressing?", options: ["A modest dip", "A generous pour", "The food should be swimming", "I have replaced all liquids in my life with ranch"] },
            { text: "You find out you have a doppelganger. First thought:", options: ["Finally, someone to cover my shifts", "I need to find them before they find me", "We should coordinate outfits", "Only one of us can survive"] },
            { text: "How chaotic is your desktop right now?", options: ["Clean. Organized folders. Labeled.", "A few stray files, nothing crazy", "You cannot see the wallpaper", "I have two desktops and both are disasters"] },
            { text: "Real life gets a power-up system. You equip:", options: ["Double jump", "Inventory system with unlimited pockets", "Save points before conversations", "A minimap that shows where snacks are"] },
            { text: "Cage match. You versus one animal. Kangaroo or ostrich?", options: ["Kangaroo. At least I know what to expect.", "Ostrich. I can outrun... wait, no I cannot.", "Neither. I choose diplomacy.", "Both. Simultaneously. In a Denny's parking lot."] },
            { text: "Someone just told you they do not like music. Response:", options: ["Suspicious but respectful", "Confused and slightly offended", "They have never heard the right song", "I am calling the authorities"] },
            { text: "You get a billboard that says anything you want. What does it say?", options: ["Something genuinely inspirational", "An inside joke nobody else gets", "Just my phone number with no context", "THEY KNOW"] },
            { text: "What is the correct way to pet a cat?", options: ["Gentle head scratches", "Let the cat decide", "Full body hug (risky)", "Respectful nod from across the room"] },
            { text: "The Guinness people show up at your door. Your world record is in:", options: ["Fastest grocery checkout", "Most consecutive days wearing the same hoodie", "Longest time pretending to work", "Most efficient nap (fell asleep fastest)"] },
            { text: "You accidentally join a cult. How long before you notice?", options: ["Immediately. The robes are a giveaway.", "A week. The chanting got suspicious.", "A month. The kool-aid tasted weird.", "I am now running the cult."] },
            { text: "If you could only eat breakfast food or dinner food forever, which?", options: ["Breakfast. Pancakes are eternal.", "Dinner. I need variety and protein.", "Breakfast, but only if hash browns count", "Dinner, because breakfast for dinner exists but not the reverse"] },
            { text: "Four words: we need to talk. Internal response:", options: ["Immediate mental review of every bad thing I have ever done", "Calm and collected. Probably nothing.", "Already packing my bags", "I need to talk first. I have concerns."] },
            { text: "A wizard lets you add one hour to your day. When?", options: ["An extra hour of sleep in the morning", "A bonus lunch hour", "An extra hour before bed", "The hour only exists inside a Taco Bell"] },
            { text: "You can only listen to one genre of music forever. Which?", options: ["Classic rock", "Lo-fi hip hop", "Film scores", "Gregorian chants, exclusively"] },
            { text: "What would you bring to a potluck if you were trying to impress?", options: ["Homemade lasagna", "An elaborate charcuterie board", "Store-bought cookies on a fancy plate", "Nothing, but I show up with incredible confidence"] },
            { text: "You just quit your job to pursue a weird hobby full-time. It is:", options: ["Competitive duck herding", "Building ships in bottles", "Learning to yodel professionally", "Collecting photos of every fire hydrant in your city"] },
            { text: "Your shower runs out of hot water mid-shampoo. You:", options: ["Power through like a warrior", "Scream once, then accept fate", "Negotiate with the water heater", "This is how supervillains are born"] },
            { text: "You are put in charge of naming a new planet. What do you call it?", options: ["Something Latin and dignified", "Dave", "Planet McPlanetface", "Do Not Land Here"] },
            { text: "Two doors: one makes you a human lie detector. The other makes you the perfect liar. Which door?", options: ["Know when others lie. Truth is power.", "Get away with lying. Convenient.", "Know when others lie, but I never lie anyway", "Get away with it. I will use this power for the pettiest things."] },
            { text: "Assembly complete. There are extra parts. Now what?", options: ["Panic. Disassemble. Start over.", "Shrug. It seems to be standing.", "Keep the parts in a drawer forever just in case", "Eat them to destroy the evidence"] },
            { text: "You discover you can talk to one species of animal. Which?", options: ["Dogs (they have so much to tell me)", "Crows (they have intel)", "Cats (I need to know what they are planning)", "Pigeons (they have seen everything)"] },
            { text: "Power goes out. Immediate vibe:", options: ["Light candles, it is cozy now", "Immediate survivalist mode", "Sit in darkness and contemplate existence", "This is MY time to shine. Literally, I have glow sticks."] },
            { text: "Rooms with no windows: cozy or concerning?", options: ["Cozy, like a little cave", "Mildly unsettling", "A prison, spiritually", "I prefer rooms with no walls, actually"] },
            { text: "You are writing a fortune cookie. What does it say?", options: ["Something vaguely threatening but technically positive", "A very specific prediction that could not possibly apply to everyone", "Help, I am trapped in a fortune cookie factory", "The next cookie will have better advice"] },
            { text: "A psychic tells you about your past life. You were:", options: ["A medieval knight who was bad at jousting", "A Victorian inventor of something useless", "A pirate with terrible sea legs", "A pharaoh who was really into cats (historically accurate)"] },
            { text: "Sleeping with socks on: normal or unhinged?", options: ["Normal and cozy", "An absolute crime", "One sock on, one sock off (balanced)", "Socks, gloves, and a hat. Full kit."] },
            { text: "You find out squirrels have been spying on you. Your reaction:", options: ["I knew it. I always knew.", "What have they seen? What do they know?", "I will start feeding them to buy their silence", "I spy back. The game is on."] },
            { text: "Body mod time: a full tail or tiny decorative wings?", options: ["Tail. Expressive and useful.", "Tiny wings. Fashion statement.", "Tail, but only if it is prehensile", "Tiny wings. I will still try to fly every single day."] },
            { text: "You have been on hold for 20 minutes. Current state:", options: ["Patient and calm", "Speaker phone and do other things", "Slowly lose my grip on reality", "I start harmonizing with the hold music"] },
            { text: "You have to pick a new national anthem. Genre?", options: ["Power ballad", "Death metal", "Smooth jazz", "The Macarena but slightly off-key"] },
            { text: "The waiter says enjoy your meal. You say you too. Recovery plan:", options: ["Die inside but keep eating", "Correct myself immediately", "Double down. You too. Enjoy MY meal.", "I never recover. I think about it every night."] },
            { text: "Pick an animal to be the size of a bus.", options: ["Hamster (terrifying but soft)", "Frog (magnificent and powerful)", "Chicken (the world is not ready)", "Goldfish (we need a bigger bowl)"] },
            { text: "You get to ban one minor inconvenience from existence. Which?", options: ["Charger cables that only work at one angle", "People who walk slowly in groups", "Websites that make you create an account", "Wet sleeves from washing your hands"] },
            { text: "If your life was a video game, what genre?", options: ["Open world RPG", "Puzzle game with no instructions", "Survival horror but in an office", "Idle clicker where nothing happens for hours"] },
            { text: "How would you survive being the last person on earth?", options: ["Go to the library, finally have time", "Move into a mansion immediately", "Talk to mannequins for company", "Build a monument to myself. Who is going to stop me?"] },
            { text: "Someone hands you a microphone at a party. You:", options: ["Sing something everyone knows", "Give a speech about something nobody asked about", "Drop it immediately and walk away", "Freestyle rap, poorly, with full commitment"] },
            { text: "What is the appropriate amount of hot sauce on food?", options: ["A few drops. Flavor, not pain.", "A generous pour. I like to feel alive.", "Enough to make my eyes water", "The food is a vehicle for hot sauce delivery"] },
            { text: "You get one do-over in your life. What do you redo?", options: ["A specific conversation that still haunts me", "A career decision", "Honestly, nothing. Chaos built character.", "Everything. Start from scratch. New game plus."] },
            { text: "Breaking news: you just won Olympic gold. The sport:", options: ["Cheese rolling", "Wife carrying", "Bog snorkeling", "Competitive rock-paper-scissors"] },
            { text: "If your personality were a weather pattern:", options: ["Sunny with a breeze", "Thunderstorm at night", "Overcast and slightly drizzly", "The 10 minutes before a tornado where everything goes green"] },
            { text: "Someone just gave you a genuine compliment. You:", options: ["Thank you, that is very kind", "Deflect with a joke immediately", "Compliment them back, harder, to win", "Short-circuit and say something unrelated"] },
            { text: "The universe takes one thing from you: doorknobs or stairs. Which goes?", options: ["No doorknobs. I will kick doors open.", "No stairs. Elevators and ramps only.", "No doorknobs. Windows are doors now.", "No stairs. I will install a fireman's pole in my house."] },
            { text: "You are trapped in a mall overnight. What do you do first?", options: ["Head to the food court", "Build a fort in the mattress store", "Try on clothes with no line for the fitting room", "Ride every escalator like a king"] },
            { text: "A fortune teller says you will be famous. For what?", options: ["An incredible achievement", "A viral embarrassment", "Something I have not done yet", "Crimes (unspecified)"] },
            { text: "Congress just approved your fake holiday. It is called:", options: ["National Leave Me Alone Day", "International Cheese Appreciation Hour", "Bring Your Conspiracy to Work Day", "Second Breakfast Day (observed)"] },
            { text: "How many unread emails do you have right now?", options: ["Under 10, I am on top of things", "10-100, manageable chaos", "100-1000, it is fine, this is fine", "I lost count. My inbox is a graveyard."] },
            { text: "You find a magic lamp but the genie is passive-aggressive. You wish for:", options: ["World peace (he cannot mess that up... right?)", "A sandwich (keep it simple)", "More genies (power move)", "I wish for the genie to be happy. Reverse psychology."] },
            { text: "What kind of teacher would you be?", options: ["The cool one who lets you call them by their first name", "The strict one who is secretly everyone's favorite", "The one who goes on tangents for the entire class", "The one who accidentally teaches the wrong subject for a week"] },
            { text: "You discover your neighbor is a vampire. You:", options: ["Mind my own business, rent is high enough", "Leave garlic at their door as a hint", "Befriend them for immortality connections", "Report them to the HOA for being up all night"] },
            { text: "The great Reese's debate: how do you eat one?", options: ["Bite into it like a normal human", "Eat the edges first, then the center", "Freeze it first for maximum snap", "Put it in a blender with milk. Reese's smoothie."] },
            { text: "What is the correct response to someone saying they do not like dogs?", options: ["Respect their opinion politely", "Suspicion, but acceptance", "Launch a PowerPoint presentation on why they are wrong", "End the friendship. Non-negotiable."] },
            { text: "The room goes silent. You lock eyes with everyone and say:", options: ["It has begun.", "I warned you about this.", "That is exactly what they want you to think.", "Tell my wife... she was right."] },
            { text: "You can add one room to your house. What is it?", options: ["A secret library behind a bookshelf", "A snack room with a mini fridge and no judgment", "A room where time moves slower so I can nap", "A room that leads to another, slightly worse room"] },
            { text: "You wake up with the ability to see 5 seconds into the future. You use it for:", options: ["Catching things I drop", "Winning every argument", "Avoiding awkward encounters", "Absolutely nothing useful"] },
            { text: "ASMR: relaxing or deeply unsettling?", options: ["Relaxing and helpful for sleep", "Deeply uncomfortable", "Only the food ones", "I am the ASMR. Everything I do is a trigger."] },
            { text: "What is the worst thing to hear a pilot say?", options: ["Oops", "Well that is new", "Hey does anyone know how to fly this thing", "I have some good news and some bad news"] },
            { text: "You get one wish but you have to say it in the form of a complaint. What is it?", options: ["I am so sick of being mortal", "I cannot believe I still have to pay rent", "Why do I have to walk everywhere like an animal", "I am tired of not being able to talk to birds"] },
            { text: "How would you describe your cooking skills?", options: ["I follow recipes and they turn out fine", "I wing it and sometimes it works", "I set off the smoke alarm as a timer", "I am a professional in an alternate timeline"] },
            { text: "A hooded figure hands you an envelope. You are being recruited into:", options: ["The Illuminati (classic)", "A book club that has never actually read a book", "An underground network of people who return shopping carts", "The group that decides when to change the McFlurry machine status"] },
            { text: "You have to wear a costume to work for a week. Which?", options: ["Business formal but it is a medieval tunic", "Full astronaut suit", "A dinosaur onesie with a tie", "My own face on a T-shirt, but bigger"] },
            { text: "Cheese-to-cracker ratio. Define perfection:", options: ["Equal parts, balanced", "More cheese, cracker is the vehicle", "More cracker, I am health-conscious", "Just cheese. The cracker was always optional."] },
            { text: "A time traveler from the year 3000 asks what matters most to your era. You say:", options: ["Technology and progress", "Love and human connection", "Whether or not a hot dog is a sandwich", "Wi-Fi passwords"] },
            { text: "Spider in the car. You are on the highway. Go:", options: ["Pull over calmly and handle it", "Scream internally but keep driving", "The spider can have the car. I will walk.", "We are carpooling now. I name it."] },
            { text: "Glitchy teleportation or painfully slow flight?", options: ["Teleport. I like surprises.", "Fly slowly. Very dramatic entrances.", "Teleport. Being 10 feet off is still faster.", "Fly. I will pack a lunch for the commute."] },
            { text: "You are writing the rules for a new board game. Rule one is:", options: ["No alliances. Trust no one.", "The youngest player goes first (fairness)", "If you laugh, you lose a turn", "There are no rules. The board is a suggestion."] },
            { text: "A petty curse for your worst enemy. They now suffer from:", options: ["Their phone is always at 1 percent", "Every door they approach is a push when they pull", "One shoe is always slightly wet", "Every traffic light turns red as they approach"] },
            { text: "Lost in a forest. No phone signal. Game plan:", options: ["Follow the river downstream", "Climb a tree and look for civilization", "Walk in one direction and hope for the best", "Befriend the wildlife and become one with the forest"] },
            { text: "You can make one conspiracy theory true. Which?", options: ["Bigfoot is real and very friendly", "The Bermuda Triangle is a portal", "Birds are actually government drones", "Finland does not exist"] },
            { text: "Your nemesis challenges you to a duel. You choose:", options: ["Swords (dramatic)", "Water guns (practical)", "A staring contest (psychological)", "A bake-off (unexpected but devastating)"] },
            { text: "If you had to explain the internet to someone from the 1800s, you would say:", options: ["Imagine a library that yells at you", "It is like a telegraph but everyone is angry", "All human knowledge, plus videos of cats", "A magic box where people argue about sandwiches"] },
            { text: "Your friend just spoiled the movie. Justice will be:", options: ["Forgive them, they are excited", "Mild disappointment expressed calmly", "They are dead to me until I see the movie", "I spoil their favorite show in retaliation. Justice."] },
            { text: "You are a ghost with one poltergeist ability. You:", options: ["Flicker the lights during dramatic moments", "Write spooky messages in the steam on mirrors", "Rearrange the fridge magnets to say unsettling things", "Unplug their phone charger every night at 3 AM"] },
            { text: "Today is the day. You are quitting. Exit strategy:", options: ["Two weeks notice, professional email", "Dramatic monologue in front of the whole office", "Just stop showing up and see how long it takes", "Send a singing telegram"] },
            { text: "You can only use one condiment for the rest of your life. Which?", options: ["Hot sauce (versatile and powerful)", "Ranch (it goes on everything, fight me)", "Soy sauce (flavor enhancer supreme)", "Mayonnaise mixed with sriracha (I call it the forbidden sauce)"] },
            { text: "Biggest dating profile red flag. Go:", options: ["No bio, just a fish photo", "Quotes the Joker unironically", "Says they are fluent in sarcasm", "Profile picture is clearly from 2008"] },
            { text: "A monkey steals your hat. Your response:", options: ["Accept my loss gracefully", "Negotiate with a banana", "Chase it through the streets", "Steal the monkey's hat. Fair is fair."] },
            { text: "How many alarms do you set in the morning?", options: ["One. I am disciplined.", "2-3, just to be safe", "5+ escalating alarms with aggressive names", "I do not use alarms. My anxiety wakes me."] },
            { text: "You can only travel by one method forever. Which?", options: ["Car (freedom)", "Train (scenic and relaxing)", "Bicycle (healthy and smug)", "Trebuchet (efficient and terrifying)"] },
            { text: "You lean over to a stranger at a dinner party and whisper:", options: ["The chicken is not what it seems", "You are the chosen one", "Check your left pocket", "They are watching"] },
            { text: "What kind of villain lair would you build?", options: ["Volcano island (classic)", "Underground bunker with a snack bar", "A regular house but the doorbell plays evil music", "A floating castle that is just a really big bouncy house"] },
            { text: "Your eternal curse: a permanent earworm or a forever unreachable itch?", options: ["Song. At least it is entertainment.", "Itch. I will build a back scratcher.", "Song, but only if it is a banger", "Itch. Suffering builds character."] },
            { text: "You are invited to dinner at the White House. You bring:", options: ["A nice bottle of wine", "A casserole because I was raised right", "Nothing, but I pocket the silverware", "My own food because I do not trust their chef"] },
            { text: "A slice of cake is placed before you. Method:", options: ["Fork, starting at the pointed end", "Fork, starting at the frosting", "Hands. Life is short.", "I eat the whole slice in one bite to assert dominance"] },
            { text: "A stranger winks at you. Your internal monologue:", options: ["That was charming", "Do they have something in their eye?", "Am I being recruited for something?", "I have been compromised. Abort mission."] },
            { text: "Pick your apocalypse survival role.", options: ["The leader with a plan", "The quiet one who surprisingly has all the skills", "The one who keeps morale up with jokes", "The one who caused the apocalypse (whoops)"] },
            { text: "What do you bring to a desert island?", options: ["A knife (practical)", "A giant book (entertainment)", "A satellite phone (cheating but smart)", "A volleyball to befriend (I saw the movie)"] },
            { text: "How honest are you with how spicy you can handle food?", options: ["Very honest. I know my limits.", "Slightly exaggerated. Pride is involved.", "I lie every time and suffer in silence", "I tell them to make it as hot as possible and then cry"] },
            { text: "Your pet starts a YouTube channel. What is the content?", options: ["Dramatic staring at walls", "ASMR eating", "Judgment compilations of my outfits", "Tutorial: how to get attention at 4 AM"] },
            { text: "For every occasion, forever: overdressed or underdressed?", options: ["Overdressed. I look great.", "Underdressed. Comfort first.", "Overdressed. Every moment is an event.", "Underdressed, specifically I am always in a bathrobe"] },
            { text: "You are now a food critic but for gas stations. Your first review:", options: ["The hot dogs have character. Bold roller technique.", "The nachos exceeded my nonexistent expectations.", "The coffee tastes like it was brewed during the Cold War.", "Five stars. I have found my people here at 2 AM."] },
            { text: "Your life just unlocked a side quest. Objective:", options: ["Learn to pick every type of lock", "Befriend every dog in a five-mile radius", "Collect a rock from every place I visit", "Master the art of leaving a party without anyone noticing"] },
            { text: "Your friend is objectively wrong about something. You:", options: ["Gently correct them with facts", "Let them be wrong. Peace is more important.", "Present a 47-slide presentation", "Agree with them publicly, then obsess privately"] },
            { text: "You have been appointed mayor of a small town. First decree:", options: ["Free tacos on Tuesdays", "Mandatory nap time for all adults", "Every meeting starts with a compliment circle", "All geese are banned effective immediately"] },
            { text: "Karaoke night. You are up. The song:", options: ["Bohemian Rhapsody (ambitious)", "Sweet Caroline (crowd pleaser)", "Baby Got Back (commitment to the bit)", "I do not sing. I narrate the room."] },
            { text: "You can send one text message to everyone on earth at the same time. What does it say?", options: ["Be kind to each other", "Behind you", "New phone, who dis?", "The simulation ends in 24 hours. Good luck."] },
            { text: "One secret skill, nobody knows you have it. You choose:", options: ["Perfect pitch", "Photographic memory", "Can always find a parking spot", "Can tell exactly how many jelly beans are in any jar"] },
            { text: "Bad haircut. The mirror confirms it. Recovery plan:", options: ["Hat for two weeks", "Own it with confidence", "Go to a different barber to fix it", "Shave it all off. Fresh start."] },
            { text: "Conversation upgrade: a pause button or an undo button?", options: ["Pause. I need time to think.", "Undo. So many things to take back.", "Pause, so I can Google my comeback", "Undo, but I will use it so much people get suspicious"] },
            { text: "You are now a supervillain but your evil plan has to involve breakfast food. What is it?", options: ["Hold the world's bacon supply hostage", "Replace all cereal with bran flakes", "A doomsday device powered by waffle irons", "Turn all the world's orange juice into pulp-heavy"] },
            { text: "You get to rename one day of the week. What is Thursday now called?", options: ["Pre-Friday", "The Day That Shall Not Be Named", "Bonus Wednesday", "Nachos Day"] },
            { text: "The person behind you in line is breathing on your neck. Countermeasure:", options: ["Take a subtle step forward", "Turn around and make aggressive eye contact", "Start coughing", "Slowly back into them until they move"] },
            { text: "Scientists confirm one mythical creature is real. You are hoping it is:", options: ["Dragons (terrifying but cool)", "Unicorns (majestic and sparkly)", "Kraken (ocean just got interesting)", "Phoenix (I want to see that rebirth thing)"] },
            { text: "You find a button that does something but nobody knows what. Do you press it?", options: ["No. Absolutely not. That is how movies start.", "Yes, immediately, no hesitation", "I press it exactly once and wait", "I press it 47 times to see if anything changes"] },
            { text: "Be honest: your most irrational fear.", options: ["That a fish will touch my foot in the ocean", "Escalators eating my shoelaces", "Being the only person who did not get the memo", "The sun just deciding to turn off one day"] },
            { text: "You are a pirate. What is your signature move?", options: ["Dramatic sword fight on the mast", "Surprisingly good negotiation skills", "A parrot that insults people for me", "I just ram my ship into theirs. Every time."] },
            { text: "X-ray vision or super hearing? One shot. Choose wisely.", options: ["X-ray vision. Practical applications.", "Super hearing. I want to hear everything.", "X-ray, but only for finding lost keys", "Super hearing, but I know I would regret it immediately"] },
            { text: "Your plant dies. How do you cope?", options: ["Get another one and try harder", "Hold a small funeral", "Accept that I am not a plant person", "Refuse to throw it out. It is just resting."] },
            { text: "Tax season. You are outsourcing to a fictional character. Who gets the job?", options: ["Hermione Granger (thorough)", "Batman (has the resources)", "Dwight Schrute (intense but dedicated)", "The Joker (audit-proof through sheer chaos)"] },
            { text: "The thermostat wars. Correct setting:", options: ["68 degrees. Science agrees.", "72 degrees. Warm and cozy.", "60 degrees. I like a brisk indoor climate.", "I will fight anyone who touches the thermostat"] },
            { text: "You get to redesign the human body. What do you fix first?", options: ["Knees. They are a disaster.", "Why do we need to sleep a third of our lives?", "Give us a third arm. Obviously.", "Bring back the tail. We were robbed."] },
            { text: "Groceries to car. What is the philosophy?", options: ["Multiple trips like a reasonable person", "One trip or I die trying", "I organize them by temperature sensitivity", "I make someone else do it"] },
            { text: "A seagull steals your french fry. What happens next?", options: ["Accept the loss", "Mild outrage, then acceptance", "Full pursuit", "I let it go, but I will never forget"] },
            { text: "Pick your ideal background music for doing chores.", options: ["Upbeat pop (motivation)", "Podcast (multitasking)", "Epic movie soundtrack (makes folding laundry feel heroic)", "Complete silence (I need to hear the dust)"] },
            { text: "You are moving to a fictional world: the Wizarding World or Middle-earth?", options: ["Harry Potter. I want a letter from Hogwarts.", "Lord of the Rings. I want to live in the Shire.", "Harry Potter, but only if I am not a muggle", "Lord of the Rings. I am built for a quest."] },
            { text: "You find a journal from your future self. First thing you check:", options: ["Am I rich?", "Did I ever figure things out?", "Lottery numbers, obviously", "I do not read it. I am afraid of spoilers."] },
            { text: "Your text was delivered three days ago. Still no reply. You:", options: ["Patience. They are busy.", "Send a follow-up text after 24 hours", "Assume the worst immediately", "Send increasingly dramatic messages until they respond"] },
            { text: "You can make one fictional technology real. Which?", options: ["Teleportation", "Time travel", "Lightsabers", "The food replicator from Star Trek"] },
            { text: "You just tripped in front of everyone. Recovery:", options: ["Smooth recovery, nobody saw that", "Look back at the ground like it tripped me", "Full commit to the fall. Dramatic. Award-winning.", "Break into a jog like I meant to do that"] },
            { text: "Your weirdest collection, the one nobody understands:", options: ["Vintage cereal boxes", "Menus from restaurants that no longer exist", "Rocks that look like famous people", "Screenshots of my worst autocorrect fails"] },
            { text: "Your Amazon package arrives but it is the wrong item. Inside is:", options: ["Something better than what I ordered", "A single rubber duck with no explanation", "A note that says YOU KNOW WHAT THIS IS FOR", "Another smaller box, and inside that, another smaller box"] },
            { text: "How many plants is too many plants?", options: ["More than 5 for a normal room", "When you need a machete to reach the couch", "There is no limit, this is a greenhouse now", "One. One is already a commitment I cannot handle."] },
            { text: "You are on a mountaintop. What do you scream?", options: ["My own name, triumphantly", "A confession nobody will ever hear", "The entire lyrics to Bohemian Rhapsody", "I HAVE OPINIONS ABOUT MAYONNAISE"] },
            { text: "Plans canceled. The excuse you always reach for:", options: ["I am not feeling well (classic)", "Something came up (vague)", "I double-booked (believable lie)", "I simply do not want to (radical honesty)"] },
            { text: "You are reincarnated as a kitchen utensil. Which one?", options: ["A sharp knife (useful and respected)", "A whisk (energetic and involved)", "A spatula (supportive and flexible)", "That weird avocado slicer nobody uses"] },
            { text: "How would you survive a horror movie?", options: ["Never investigate strange noises", "Stay in groups at all times", "Be the funny one (they sometimes survive)", "Simply leave. Just go home. Walk out the door."] },
            { text: "Breakfast cereal hot take. Drop it:", options: ["The milk goes in after the cereal, this is law", "Cereal is a perfectly fine dinner", "The cereal-to-milk ratio is more important than most relationships", "I eat cereal dry and I am not sorry"] },
            { text: "You gain the ability to speak to one inanimate object. Which?", options: ["My car (what is that noise?)", "My bed (are you comfortable? am I doing this right?)", "The TV remote (where do you hide?)", "The office printer (why do you hate me?)"] },
            { text: "New company policy to fix boring meetings:", options: ["Everyone has to hold a plank the entire time", "A buzzer goes off when someone says synergy", "All meetings are conducted while walking", "The last person to arrive has to present first, on any topic"] },
            { text: "Someone ate your labeled lunch from the work fridge. This means war:", options: ["Let it go. I am above this.", "Passive-aggressive note", "Launch a full investigation", "Replace it with an identical container of something terrible"] },
            { text: "You can only speak in questions for 24 hours. How annoying are you?", options: ["Mildly inconvenient", "Extremely frustrating to everyone around me", "I would actually be kind of philosophical", "Is that even a question?"] },
            { text: "Brain upgrade: photographic memory or selective amnesia on demand?", options: ["Photographic memory. Knowledge is power.", "Forget on command. There are things I need gone.", "Memory. I want to win every argument with receipts.", "Forget. I will use it after this quiz."] },
            { text: "Fake resume skills that you genuinely possess:", options: ["Expert-level napping", "Fluent in dog body language", "Advanced snack acquisition", "Parallel parking on the first try (once)"] },
            { text: "You are building your dream treehouse. It has:", options: ["A slide instead of stairs", "A retractable bridge for keeping people out", "A fully stocked mini fridge", "A catapult for unwanted visitors"] },
            { text: "Milk before cereal: acceptable or criminal?", options: ["Different strokes for different folks", "Deeply unsettled", "I am calling the police", "I do this and I will not be shamed"] },
            { text: "If you could only have one app on your phone, which?", options: ["Maps (practical)", "Spotify (sanity)", "Camera (memories)", "A single note where I write everything down like a madman"] },
            { text: "A wizard curses you to always tell the truth. How long do you last in society?", options: ["I would be fine. I am mostly honest.", "Maybe a week before things get awkward", "48 hours before I am fired", "I am already this person and it is not going well"] },
            { text: "You just showed up to a party. Your entrance:", options: ["Casual wave and head to the snacks", "Announce myself loudly by name", "Wait for someone to notice me, then act surprised", "Kick the door open and yell GUESS WHO"] },
            { text: "You find a time machine but it only goes to boring historical moments. Where do you go?", options: ["The invention of the sandwich", "The first person to put pineapple on pizza", "The meeting where they decided the work week is 5 days", "The moment someone said yeah let us domesticate cats"] },
            { text: "Someone waves. It might not be at you. Tactical response:", options: ["Wave back confidently", "Do a half-wave that could be mistaken for a stretch", "Look behind me first to confirm", "Wave so enthusiastically that even if it was not for me they have to commit"] },
            { text: "Lifetime perk: all green lights or zero lines, ever?", options: ["Green lights. Driving is daily suffering.", "No lines. I hate waiting.", "Green lights, I will plan my life around driving", "No lines. I am going to theme parks immediately."] },
            { text: "Name something technically legal that feels deeply illegal.", options: ["Leaving a store without buying anything", "Walking past a security guard with nothing to hide", "Using the bathroom at a restaurant without ordering food", "Going through customs with an empty suitcase"] },
            { text: "You are now a fortune teller. Your predictions are:", options: ["Vaguely positive and applicable to everyone", "Weirdly specific and always about food", "Technically correct but useless", "Just my personal opinions disguised as destiny"] },
            { text: "The seat in front of you just reclined into your lap. Response:", options: ["Accept it. It is their right.", "Passive-aggressive knee pressure", "Recline my own seat in solidarity", "Stare at the back of their head until they feel it"] },
            { text: "Your unofficial life catchphrase, said at least twice daily:", options: ["Anyway, moving on", "That sounds like a problem for future me", "I am going to pretend I did not hear that", "And THAT is why we cannot have nice things"] },
            { text: "You accidentally become famous overnight. For what?", options: ["A really good tweet", "Being in the background of a news broadcast doing something weird", "A cooking video that went horribly wrong", "My cat did something incredible and I was just there"] },
            { text: "Monday morning energy. Describe it:", options: ["Cautiously optimistic", "Functional but fragile", "I am physically present but spiritually elsewhere", "I am vibrating with rage at the concept of Mondays"] },
            { text: "Cosmic guarantee: catlike landings or perpetual good luck?", options: ["Feet, I want catlike reflexes", "Butter-side up, I want good luck in general", "Feet. I fall a lot and this would be useful.", "Butter-side up. My toast deserves this."] },
            { text: "You are writing a one-star review of planet Earth. Main complaint:", options: ["The customer service is terrible", "The tutorial was way too long", "Too many bugs, needs a patch", "No fast travel option"] },
            { text: "Pick an alter ego name.", options: ["The Negotiator", "Shadow McCloud", "Captain Hindsight", "Greg (it is funnier if it is mundane)"] },
            { text: "How many browser tabs do you need to feel productive?", options: ["3-5, focused and clean", "10-15, organized chaos", "20+, I am researching everything at once", "One tab. Just email. Forever."] },
            { text: "You walk into a room and everyone stops talking. You think:", options: ["They were talking about me", "Coincidence, surely", "I should say something to break the silence", "Good. They should stop talking when I enter."] },
            { text: "Bizarre law on the books. Shockingly, you already follow it:", options: ["No singing in the bathtub on Sundays", "It is illegal to wrestle a bear", "You cannot carry an ice cream cone in your back pocket", "All snowmen must be under 6 feet tall"] },
            { text: "Your leftovers situation. Be honest:", options: ["I eat them within 24 hours like a responsible adult", "They sit in the fridge for a week, then I feel guilty", "I forget about them until they become a science experiment", "I eat them at 2 AM standing in front of the fridge"] },
            { text: "You are offered a free trip to space but there is a 5 percent chance it goes wrong. You:", options: ["Go. Space is worth the risk.", "Pass. I like being alive.", "Go, but only if I get to pick the playlist", "5 percent? Those are better odds than my daily commute."] },
            { text: "Every time you sit, an involuntary noise escapes. It sounds like:", options: ["A satisfied sigh", "The Windows startup sound", "A gentle oof", "A dramatic orchestral sting"] },
            { text: "When someone says I am not like other people, you think:", options: ["We are all unique, it is fine", "Slightly suspicious", "That is exactly what other people say", "I am not like those people who say that"] },
            { text: "You can eat anything with no calories for one day. What are you eating?", options: ["Pizza in every conceivable form", "An irresponsible amount of pasta", "One of everything at a bakery", "I would eat a memory. I want to know what nostalgia tastes like."] },
            { text: "If you came with a warning label, it would read:", options: ["Caution: may overshare", "Warning: contains strong opinions", "Handle with coffee", "Do not operate before noon"] },
            { text: "You are the last to leave the office. You:", options: ["Turn off the lights and leave normally", "Do a victory lap around the empty cubicles", "Say goodbye to the plants", "Spin in the boss's chair exactly once"] },
            { text: "Scariest thing that is not technically scary:", options: ["A phone call from an unknown number", "Someone saying can I ask you something", "An email from your boss at 11 PM with no subject line", "The dentist saying hmm interesting"] },
            { text: "Permanent upgrade: flawless hair every day or perfect posture forever?", options: ["Good hair. Confidence in a follicle.", "Good posture. My back is begging.", "Hair. I can fake posture.", "Posture. I will wear a hat."] },
            { text: "You discover a secret room in your workplace. Inside is:", options: ["A nap pod and I am never leaving", "Every snack that has ever gone missing from the break room", "A portal to a slightly better version of the office", "The answer to who keeps stealing my lunch"] },
            { text: "The allergist has bad news. You are allergic to:", options: ["Mondays", "Eye contact", "Bad Wi-Fi", "The sound of someone chewing"] },
            { text: "How would you handle being invisible for a day?", options: ["Responsibly observe and learn", "Play harmless pranks on everyone I know", "Finally go grocery shopping without seeing anyone I know", "Stand behind people and whisper motivational quotes"] },
            { text: "You can make one rule that everyone in the world has to follow. What is it?", options: ["Return your shopping cart", "Use your turn signal", "Say please and thank you", "No phone calls when a text will do"] },
            { text: "The thing that summons you no matter what:", options: ["The smell of fresh coffee", "Someone saying free food in the break room", "A text that just says SOS", "The opening notes of my favorite song from 300 feet away"] },
            { text: "Your new baseline: always a little hungry or always a little sleepy?", options: ["Hungry. I can snack.", "Sleepy. I already live like this.", "Hungry. It keeps me motivated.", "Sleepy, because then naps are always justified."] },
            { text: "You find a notebook that whatever you write in it comes true, but only for mundane things. First entry:", options: ["My commute has no traffic", "I always have exact change", "My Wi-Fi never drops", "Every avocado I buy is perfectly ripe"] },
            { text: "Worst restaurant concept. Investors are lining up:", options: ["Hospital food but on purpose", "Everything is spherical", "The menu is in riddles", "You eat in complete darkness and the waiters are mimes"] },
            { text: "How many times do you check if the door is locked?", options: ["Once, like a normal person", "Twice, just to be safe", "Three or more times, I do not trust myself", "I leave it unlocked. Come in. I dare you."] },
            { text: "A duck starts following you everywhere. You:", options: ["Accept my new companion", "Try to return it to a pond", "Name it and buy it a tiny hat", "This has happened before and I am not surprised"] },
            { text: "You get to add one class to every school curriculum. What is it?", options: ["How to do your taxes", "Napping 101", "How to have a conversation without checking your phone", "Advanced Snack Preparation"] },
            { text: "Your WiFi password says a lot about you. Its energy:", options: ["Something sensible and secure", "My pet's name plus some numbers", "An inside joke nobody gets", "It is still the default from the router"] },
            { text: "Mandatory rule: slide into every room or moonwalk out of every room?", options: ["Slide in. Dramatic entrances are my brand.", "Moonwalk out. Mysterious exits.", "Slide. I am already clumsy, might as well commit.", "Moonwalk. Every meeting ends with me gliding backwards."] },
            { text: "A genie offers you perfect memory of one specific category. Which?", options: ["Names (no more awkward forgetting)", "Directions (never lost again)", "Conversations (win every argument)", "Where I put my keys (this would change my life)"] },
            { text: "You are designing a theme park ride based on your life. It is:", options: ["A slow scenic ride with one unexpected drop", "A roller coaster that keeps almost derailing", "A haunted house where the scares are all social situations", "A carousel that goes slightly too fast and never quite stops"] },
            { text: "Someone is talking through the entire movie. Intervention:", options: ["Gentle shush", "Death stare", "Move seats", "Talk louder about a different movie to confuse them"] },
            { text: "You are in the Inventor Hall of Shame. Your creation:", options: ["A solar-powered flashlight", "Waterproof sponge", "A screen door for a submarine", "Fireproof matches"] },
            { text: "You wake up and it is the same day as yesterday. Groundhog Day. First reaction:", options: ["Panic", "Cool, second chance at that conversation", "Learn a new skill with infinite time", "Finally commit every crime with no consequences (the day resets)"] },
            { text: "The phrase it is what it is. Your take:", options: ["Profound in its simplicity", "The verbal equivalent of a shrug", "I say it 10 times a day", "It is what it is"] },
            { text: "One TV show, on repeat, for eternity. Genre:", options: ["Comedy (I need laughs to survive)", "Drama (keeps things intense)", "Documentary (I will learn everything)", "Reality TV (I want to feel superior)"] },
            { text: "A sound effect now plays every time you walk into a room. It is:", options: ["Sitcom applause", "A single dramatic piano note", "The Law and Order dun dun", "Absolute silence. Even my footsteps stop."] },
            { text: "A moth has breached your home. Protocol:", options: ["Open a window and hope for the best", "Guide it out with a cup and paper", "Turn off all lights inside and turn on porch light", "Let it live here. It pays no rent but neither does it complain."] },
            { text: "You are shrunk down and placed inside a blender. How do you escape?", options: ["Climb out before anyone notices", "Lie flat below the blades and wait", "Use something to jam the mechanism", "I befriend the blender and we reach an agreement"] },
            { text: "In a fantasy world, your LinkedIn says:", options: ["Dragon veterinarian", "Potion taste tester", "Dungeon interior designer", "Professional quest giver"] },
            { text: "Highest stress, lowest stakes. The situation:", options: ["Choosing a restaurant for a group", "Parallel parking while someone watches", "Saying goodbye to someone and then walking the same direction", "Holding a door for someone who is just slightly too far away"] },
            { text: "One question. That is all you get. For life. The question:", options: ["Why?", "What if?", "Are you going to eat that?", "Did I leave the stove on?"] },
            { text: "A crow brings you a shiny object every day. By month three you:", options: ["Have a lovely collection of trinkets", "Are worried about where they are getting this stuff", "Have formed a deep emotional bond with the crow", "Am now running a crow-based import business"] },
            { text: "Bodily fluid situation: maple syrup sweat or lemonade tears?", options: ["Maple syrup. Breakfast is solved.", "Lemonade tears. Dramatic and refreshing.", "Syrup, but I would avoid the gym forever", "Lemonade. I would cry at sad movies and sell drinks."] },
            { text: "Be honest: the one reality show you would absolutely dominate:", options: ["Survivor (I am scrappy)", "The Great British Bake Off (I stress-bake)", "The Amazing Race (I am fast when scared)", "Jeopardy (I know random things and nothing useful)"] },
            { text: "You get to add one feature to your body like a software update. What is it?", options: ["Sleep mode that actually works in 20 minutes", "Built-in spell check before I speak", "Hunger notifications with a snooze button", "A skip button for awkward situations"] },
            { text: "Pizza technique. This says everything about you:", options: ["Fold it. The New York way.", "Flat, with dignity", "Crust first (I like to watch the world burn)", "With a fork and knife (I have my reasons)"] },
            { text: "You discover your pet has a secret double life. They are:", options: ["A neighborhood vigilante", "Running an underground food ring", "Much more popular than me on social media", "Actually a government agent assigned to monitor me"] },
            { text: "Curse your nemesis with the pettiest superpower imaginable:", options: ["They can only sneeze in threes", "They always feel like their phone is vibrating", "Every song they hear is slightly off-key", "They can never find the end of the tape roll on the first try"] },
            { text: "Quick: name the most trustworthy cheese.", options: ["Cheddar (reliable, no surprises)", "Mozzarella (versatile team player)", "Gouda (easygoing, crowd pleaser)", "Swiss (full of holes but honest about it)"] },
            { text: "You are given a penguin. You cannot give it away. What now?", options: ["Dedicate a room to it with AC", "Move somewhere cold", "Take it everywhere in a little wagon", "The penguin and I are now business partners"] },
